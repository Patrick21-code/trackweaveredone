<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — TrackWeave</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,300;1,9..144,400;1,9..144,500&family=Instrument+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <!-- Base design system -->
  <link rel="stylesheet" href="../styles/trackweave-base.css" />
  <!-- Dashboard-specific styles -->
  <link rel="stylesheet" href="../styles/dashboard-page.css" />

  <style>
    /* ══════════════════════════════════════════════════════════════
       DASHBOARD INLINE OVERRIDES
       These rules correct and extend dashboard-page.css.
       They are scoped precisely so nothing in the base design breaks.
    ══════════════════════════════════════════════════════════════ */

    /* ── 1. Nav — fixed, always on top ───────────────────────────── */
    .nav {
      position: fixed !important;
      top: 0; left: 0; right: 0;
      z-index: 9000 !important;
    }
    /* Push shell content below fixed nav */
    #dash-shell { padding-top: 72px; }

    /* ── 2. Scroll lock ───────────────────────────────────────────── */
    body.overlay-open { overflow: hidden; }

    /* ══════════════════════════════════════════════════════════════
       ARTIST CARDS — correct sizing, colour & circular frames
    ══════════════════════════════════════════════════════════════ */

    /* Card layout — flex column, centred */
    .artist-card {
      display: flex !important;
      flex-direction: column !important;
      align-items: center !important;
      text-decoration: none;
      cursor: pointer;
      /* Remove any background the CSS file added so hover is intentional */
      background: transparent !important;
    }

    /* Image wrapper — square, circular, sized to match skeleton (.sk-img) */
    /* The skeleton card is flex: 0 0 calc(16.666% - 0.72rem) with padding 0.9rem,
       so the image takes the full inner width minus padding.
       We mirror that by removing card padding and letting the wrapper fill width. */
    .artist-card { padding: 0.6rem 0.5rem 0.8rem !important; }

    .artist-img-wrap {
      width: 100% !important;
      aspect-ratio: 1 !important;
      border-radius: 50% !important;
      overflow: hidden !important;
      position: relative !important;
      flex-shrink: 0 !important;
      margin-bottom: 0.75rem !important;
      background: #e8e4df;
      box-shadow: 0 2px 12px rgba(17,24,32,0.08);
      transition: box-shadow 0.28s, transform 0.28s;
    }
    .artist-card:hover .artist-img-wrap {
      box-shadow: 0 8px 28px rgba(17,24,32,0.18);
      transform: scale(1.05);
    }

    /* Image background container — fills the circle */
    .artist-img-bg {
      position: absolute !important;
      inset: 0 !important;
      width: 100% !important;
      height: 100% !important;
      border-radius: 50% !important;
      overflow: hidden !important;
      display: flex !important;
      align-items: center !important;
      justify-content: center !important;
    }

    /* The actual <img> — cover-fit, circular */
    .artist-img-bg img {
      width: 100% !important;
      height: 100% !important;
      object-fit: cover !important;
      object-position: center top !important;
      display: block !important;
      border-radius: 50% !important;
    }

    /* Shimmer while image loads */
    .artist-img-bg.loading {
      background: linear-gradient(
        90deg,
        #ede9e4 25%,
        #d8d3cd 50%,
        #ede9e4 75%
      ) !important;
      background-size: 200% 100% !important;
      animation: tw-shimmer 1.4s infinite linear !important;
    }
    @keyframes tw-shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* Music-note placeholder — shown when no image is available */
    .artist-img-placeholder {
      width: 100% !important;
      height: 100% !important;
      display: flex !important;
      align-items: center !important;
      justify-content: center !important;
      border-radius: 50% !important;
    }
    .artist-img-placeholder svg {
      width: 36% !important;
      height: 36% !important;
      opacity: 0.7 !important;
      flex-shrink: 0 !important;
    }

    /* ── Artist text labels — dark readable colours ───────────────── */
    /* Use explicit hex so we don't depend on CSS vars that may not exist */
    .artist-name {
      font-size: 0.8rem !important;
      font-weight: 600 !important;
      color: #1a1a1a !important;       /* solid dark — readable on white bg */
      text-align: center !important;
      white-space: nowrap !important;
      overflow: hidden !important;
      text-overflow: ellipsis !important;
      max-width: 100% !important;
      line-height: 1.3 !important;
      margin-bottom: 0.15rem !important;
      transition: color 0.15s !important;
    }
    .artist-card:hover .artist-name { color: #2563eb !important; }

    .artist-sub {
      font-size: 0.7rem !important;
      color: #6b7280 !important;       /* mid-grey — accessible on white */
      text-align: center !important;
      white-space: nowrap !important;
      overflow: hidden !important;
      text-overflow: ellipsis !important;
      max-width: 100% !important;
    }

    /* ══════════════════════════════════════════════════════════════
       SEE ALL OVERLAY — white background, 5-per-row, consistent cards
    ══════════════════════════════════════════════════════════════ */

    .see-all-overlay {
      position: fixed !important;
      inset: 0 !important;
      z-index: 8000 !important;
      background: #ffffff !important;  /* white background as requested */
      display: flex !important;
      flex-direction: column !important;
      padding-top: var(--nav-height, 72px) !important;
      transform: translateX(100%) !important;
      transition: transform 0.32s cubic-bezier(0.22, 1, 0.36, 1) !important;
      overflow: hidden !important;
    }
    .see-all-overlay.open {
      transform: translateX(0) !important;
    }

    /* Top-bar — matches nav aesthetic, light theme */
    .see-all-topbar {
      display: flex !important;
      align-items: center !important;
      gap: 1rem !important;
      padding: 0 2.5rem !important;
      height: 60px !important;
      flex-shrink: 0 !important;
      border-bottom: 1px solid #e5e7eb !important;
      background: rgba(255,255,255,0.97) !important;
      backdrop-filter: blur(16px) !important;
      -webkit-backdrop-filter: blur(16px) !important;
    }
    .see-all-back {
      display: flex !important;
      align-items: center !important;
      gap: 0.4rem !important;
      font-size: 0.82rem !important;
      font-weight: 500 !important;
      color: #374151 !important;
      cursor: pointer !important;
      border: 1.5px solid #d1d5db !important;
      background: none !important;
      border-radius: 99px !important;
      padding: 0.38rem 0.85rem 0.38rem 0.65rem !important;
      font-family: inherit !important;
      transition: border-color 0.16s, color 0.16s, background 0.16s !important;
    }
    .see-all-back:hover {
      border-color: #111827 !important;
      color: #111827 !important;
      background: #f9fafb !important;
    }
    .see-all-back svg { color: #6b7280 !important; }
    .see-all-back:hover svg { color: #111827 !important; }

    .see-all-genre-title {
      font-family: 'Fraunces', serif !important;
      font-size: 1.2rem !important;
      font-weight: 500 !important;
      color: #111827 !important;
      letter-spacing: -0.02em !important;
      flex: 1 !important;
    }
    .see-all-count {
      font-size: 0.78rem !important;
      color: #6b7280 !important;
      background: #f3f4f6 !important;
      border: 1px solid #e5e7eb !important;
      border-radius: 99px !important;
      padding: 0.22rem 0.7rem !important;
    }

    /* Scrollable body */
    .see-all-body {
      flex: 1 !important;
      overflow-y: auto !important;
      padding: 2rem 2.5rem 3rem !important;
      background: #ffffff !important;
    }

    /* Grid — exactly 5 columns, consistent with carousel card sizing */
    .see-all-grid {
      display: grid !important;
      grid-template-columns: repeat(5, 1fr) !important;
      gap: 1.8rem 1.2rem !important;
      max-width: 860px !important;   /* keeps cards from getting too wide on large screens */
      margin: 0 auto !important;
    }

    /* Grid cards — same dimensions and circular style as carousel */
    .see-all-grid .artist-card {
      flex: unset !important;
      min-width: 0 !important;
      max-width: none !important;
      width: 100% !important;
      /* Light card surface for definition on white bg */
      background: #f9fafb !important;
      border: 1px solid #e5e7eb !important;
      border-radius: 14px !important;
      padding: 1rem 0.75rem 0.9rem !important;
      transition: box-shadow 0.22s, transform 0.22s, border-color 0.22s !important;
    }
    .see-all-grid .artist-card:hover {
      background: #ffffff !important;
      box-shadow: 0 8px 28px rgba(17,24,32,0.12) !important;
      transform: translateY(-3px) !important;
      border-color: #d1d5db !important;
    }
    /* Text colours are the same dark tokens — already set globally above */

    /* Responsive: 3-col on tablet, 2-col on mobile */
    @media (max-width: 700px) {
      .see-all-grid { grid-template-columns: repeat(3, 1fr) !important; max-width: none !important; }
      .see-all-topbar { padding: 0 1.2rem !important; }
      .see-all-body { padding: 1.2rem !important; }
    }
    @media (max-width: 420px) {
      .see-all-grid { grid-template-columns: repeat(2, 1fr) !important; }
    }
  </style>

  <script type="module">
    import { initializeApp }   from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut }
                               from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getFirestore, doc, getDoc }
                               from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey:            "AIzaSyBIEvBzIOtBFJpCxqM2onqFbK6Nw82AYp4",
      authDomain:        "trackweave-26cad.firebaseapp.com",
      projectId:         "trackweave-26cad",
      storageBucket:     "trackweave-26cad.firebasestorage.app",
      messagingSenderId: "906996721432",
      appId:             "1:906996721432:web:483313759725eb2022a06d"
    };

    const app  = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db   = getFirestore(app);

    // ── MusicBrainz genre → search tag mapping ───────────────────
    const GENRE_MB_MAP = {
      "Alternative":  "alternative rock",
      "Indie":        "indie rock",
      "Hip-Hop":      "hip-hop",
      "R&B":          "rhythm and blues",
      "Pop":          "pop",
      "Electronic":   "electronic",
      "Rock":         "rock",
      "Classical":    "classical",
      "Jazz":         "jazz",
      "Metal":        "heavy metal",
      "Folk":         "folk",
      "Soul":         "soul music",
      "Country":      "country",
      "Punk":         "punk rock",
      "Experimental": "experimental",
      "Latin":        "latin",
      "K-Pop":        "k-pop",
      "OPM":          "opm",
    };

    // ── Session cache — survives page interactions, clears on tab close ──
    // Key: "tw_artists_<genre>", Value: JSON-stringified artist array
    const CACHE_PREFIX = "tw_artists_";
    const CACHE_TTL_MS = 30 * 60 * 1000; // 30 min

    function cacheGet(genre) {
      try {
        const raw = sessionStorage.getItem(CACHE_PREFIX + genre);
        if (!raw) return null;
        const { ts, data } = JSON.parse(raw);
        if (Date.now() - ts > CACHE_TTL_MS) { sessionStorage.removeItem(CACHE_PREFIX + genre); return null; }
        return data;
      } catch { return null; }
    }
    function cacheSet(genre, data) {
      try { sessionStorage.setItem(CACHE_PREFIX + genre, JSON.stringify({ ts: Date.now(), data })); } catch { /* storage full */ }
    }

    // ── Global deduplicate set ────────────────────────────────────
    const usedArtistIds = new Set();

    // ── MB rate-limit helper — 1 req/sec ─────────────────────────
    let _lastMbReq = 0;
    async function mbFetch(url) {
      const now  = Date.now();
      const wait = Math.max(0, 1050 - (now - _lastMbReq));
      if (wait > 0) await new Promise(r => setTimeout(r, wait));
      _lastMbReq = Date.now();
      const res = await fetch(url, { headers: { "User-Agent": "TrackWeave/1.0 (hello@trackweave.app)" } });
      return res;
    }

    // ── Auth guard ────────────────────────────────────────────────
    onAuthStateChanged(auth, async (user) => {
      if (!user) { window.location.href = "./login.html"; return; }

      const snap = await getDoc(doc(db, "users", user.uid));
      const data = snap.exists() ? snap.data() : {};
      if (!data.onboardingComplete) { window.location.href = "./onboarding.html"; return; }

      const firstName   = data.firstName ?? (user.displayName?.split(" ")[0] ?? "Listener");
      const lastName    = data.lastName  ?? "";
      const displayName = `${firstName} ${lastName}`.trim();
      const username    = data.username  ?? "";
      const photoURL    = user.photoURL  ?? "";
      const genres      = data.favoriteGenres ?? [];

      // ── Hero header ───────────────────────────────────────────
      document.getElementById("dash-name").textContent = `Welcome back, ${firstName}.`;

      const genreChipWrap = document.getElementById("hero-genres");
      if (genres.length && genreChipWrap) {
        genreChipWrap.innerHTML = genres
          .map(g => `<span class="hero-genre-chip" data-genre="${escHtml(g)}">${escHtml(g)}</span>`)
          .join("");
        genreChipWrap.querySelectorAll(".hero-genre-chip").forEach(chip => {
          chip.addEventListener("click", () => {
            const genre = chip.dataset.genre;
            const blockId = "c-" + genre.toLowerCase().replace(/[\s&]/g,"-").replace(/[^a-z0-9-]/g,"");
            const target = document.getElementById(blockId);
            if (target) {
              const navH = document.querySelector(".nav")?.offsetHeight ?? 72;
              const y = target.getBoundingClientRect().top + window.scrollY - navH - 24;
              window.scrollTo({ top: y, behavior: "smooth" });
            }
          });
        });
      }

      // ── Avatar ────────────────────────────────────────────────
      const setAvatar = (el) => {
        if (!el) return;
        if (photoURL) {
          el.innerHTML = `<img src="${escHtml(photoURL)}" alt="${escHtml(displayName)}" />`;
        } else {
          el.textContent = firstName.charAt(0).toUpperCase();
          el.style.background = `linear-gradient(135deg, var(--blue), #7c3aed)`;
        }
      };
      setAvatar(document.getElementById("nav-avatar"));

      document.getElementById("drop-display-name").textContent = displayName;
      document.getElementById("drop-username").textContent = username ? `@${username}` : user.email ?? "";

      document.getElementById("btn-signout").addEventListener("click", async () => {
        await signOut(auth);
        window.location.href = "./login.html";
      });

      document.getElementById("dash-shell").hidden = false;

      // ── Build carousels ────────────────────────────────────
      if (genres.length) {
        buildCarousels(genres);
      } else {
        document.getElementById("artists-section").innerHTML =
          `<p class="artists-empty">Select some genres in your profile to get personalised recommendations.</p>`;
      }
    });

    // ── Build all carousels — skeletons shown immediately ──────────────
    async function buildCarousels(genres) {
      const section = document.getElementById("artists-section");
      section.innerHTML = "";

      const eyebrow = document.createElement("p");
      eyebrow.className = "section-eyebrow";
      eyebrow.textContent = "Based on your taste";
      section.appendChild(eyebrow);

      // 1. Render all skeleton blocks immediately
      const skeletonBlocks = {};
      genres.forEach(genre => {
        const blockId = "c-" + genre.toLowerCase().replace(/[\s&]/g,"-").replace(/[^a-z0-9-]/g,"");
        const sk = document.createElement("div");
        sk.className = "genre-carousel-block skeleton-block";
        sk.id = `sk-${blockId}`;
        sk.innerHTML = `
          <div class="genre-carousel-header">
            <div class="sk-title-bar"></div>
          </div>
          <div class="carousel-skeleton">
            ${Array(6).fill(0).map(() => `
              <div class="sk-card">
                <div class="sk-img" style="border-radius:50%"></div>
                <div class="sk-line"></div>
                <div class="sk-line short"></div>
              </div>`).join("")}
          </div>`;
        section.appendChild(sk);
        skeletonBlocks[genre] = sk;
      });

      const creditEl = document.createElement("p");
      creditEl.className = "api-credit";
      creditEl.innerHTML = `Artist data via <a href="https://musicbrainz.org" target="_blank" rel="noopener">MusicBrainz</a> &amp; <a href="https://coverartarchive.org" target="_blank" rel="noopener">Cover Art Archive</a>`;
      section.appendChild(creditEl);

      // 2. Fetch genres — check cache first, then API.
      //    Cached genres resolve instantly (no stagger needed).
      //    Uncached genres are staggered to respect MB rate limit.
      let mbSlot = 0; // MB API slot counter for uncached genres
      const STAGGER_MS = 1100;

      const promises = genres.map(async (genre) => {
        // Check cache first — no rate-limit delay needed
        const cached = cacheGet(genre);
        if (cached) {
          try {
            // Re-mark used IDs from cache
            cached.forEach(a => usedArtistIds.add(a.id));
            return { genre, artists: cached };
          } catch { /* fall through to API */ }
        }

        // Not cached — assign an MB slot and wait
        const mySlot = mbSlot++;
        if (mySlot > 0) await new Promise(r => setTimeout(r, mySlot * STAGGER_MS));

        try {
          const result = await fetchArtistsForGenre(genre);
          if (result.artists.length) cacheSet(genre, result.artists);
          return result;
        } catch (e) {
          console.warn(`[TrackWeave] Skipped genre "${genre}":`, e);
          return { genre, artists: [] };
        }
      });

      // As each promise resolves, swap its skeleton for the real block
      promises.forEach(async (p, i) => {
        const { genre, artists } = await p;
        const sk = skeletonBlocks[genre];
        if (!artists.length) { sk?.remove(); return; }
        const block = buildCarouselBlock(genre, artists);
        if (sk) {
          section.insertBefore(block, sk);
          sk.remove();
        } else {
          section.insertBefore(block, creditEl);
        }
      });
    }

    // ── Fetch artists for a genre ─────────────────────────────────────
    async function fetchArtistsForGenre(genre) {
      const tag = GENRE_MB_MAP[genre] ?? genre.toLowerCase();
      const url = `https://musicbrainz.org/ws/2/artist?query=tag:(${encodeURIComponent(tag)})&limit=30&fmt=json`;

      const res = await mbFetch(url);
      if (!res.ok) throw new Error(`MusicBrainz ${res.status}`);

      const json = await res.json();
      let allArtists = (json.artists ?? []).filter(a => a.id && a.name);

      const fresh  = allArtists.filter(a => !usedArtistIds.has(a.id));
      const chosen = fresh.slice(0, 14);
      chosen.forEach(a => usedArtistIds.add(a.id));

      // Enrich images
      const enriched = await enrichBatch(chosen);
      return { genre, artists: enriched };
    }

    // ── Enrich artists with cover art — optimised pipeline ───────────
    // Strategy:
    //   1. For each artist, fire the MB release-group fetch (rate-limited).
    //   2. Collect all candidate release-group IDs.
    //   3. Probe CAA for ALL artists in parallel (CAA has no strict limit).
    //   4. First successful CAA URL wins for each artist.
    async function enrichBatch(artists) {
      // Step 1+2: gather release group IDs (MB is rate-limited, do sequentially)
      const candidateMap = new Map(); // artistId → string[]

      for (const artist of artists) {
        try {
          // Try album-type first
          const rgRes = await mbFetch(
            `https://musicbrainz.org/ws/2/release-group?artist=${artist.id}&type=album&limit=6&fmt=json`
          );
          if (rgRes.ok) {
            const j = await rgRes.json();
            const ids = (j["release-groups"] ?? [])
              .filter(rg => rg["primary-type"] === "Album")
              .slice(0, 5).map(rg => rg.id);
            if (ids.length) { candidateMap.set(artist.id, ids); continue; }
          }
        } catch { /* fall through */ }

        try {
          // Fallback: any release group
          const rgRes2 = await mbFetch(
            `https://musicbrainz.org/ws/2/release-group?artist=${artist.id}&limit=6&fmt=json`
          );
          if (rgRes2.ok) {
            const j2 = await rgRes2.json();
            const ids2 = (j2["release-groups"] ?? []).slice(0, 5).map(rg => rg.id);
            if (ids2.length) candidateMap.set(artist.id, ids2);
          }
        } catch { /* no ids found */ }
      }

      // Step 3: Probe CAA for all artists concurrently (no rate limit on CAA)
      await Promise.all(artists.map(async (artist) => {
        const rgIds = candidateMap.get(artist.id) ?? [];
        // Try all release groups in parallel, take first success
        const results = await Promise.allSettled(
          rgIds.map(rgId => checkCoverArt(rgId))
        );
        for (const r of results) {
          if (r.status === "fulfilled" && r.value) {
            artist._coverUrl = r.value;
            break;
          }
        }
      }));

      return artists;
    }

    // ── Probe Cover Art Archive for a release-group ───────────────────
    // Uses the CAA JSON API which is CORS-friendly and returns thumbnail URLs.
    // Falls back to a direct GET on the CDN URL if the JSON API returns nothing.
    async function checkCoverArt(releaseGroupId) {
      try {
        // 1. CAA JSON API — most reliable, explicit CORS support
        const apiRes = await fetch(
          `https://coverartarchive.org/release-group/${releaseGroupId}`,
          { headers: { "Accept": "application/json" } }
        );
        if (apiRes.ok) {
          const json = await apiRes.json();
          const images = json.images ?? [];
          const front  = images.find(img => img.front) ?? images[0];
          if (front) {
            return front.thumbnails?.["250"] ?? front.thumbnails?.small ?? front.image ?? null;
          }
        }
      } catch { /* fall through */ }

      try {
        // 2. Direct CDN fallback via GET (HEAD is unreliable cross-origin)
        const directUrl = `https://coverartarchive.org/release-group/${releaseGroupId}/front-250`;
        const directRes = await fetch(directUrl);
        if (directRes.ok) return directUrl;
      } catch { /* silent */ }

      return null;
    }

    // ── Build carousel DOM block ──────────────────────────────────────
    function buildCarouselBlock(genre, artists) {
      const blockId = `c-${genre.toLowerCase().replace(/[\s&]/g,"-").replace(/[^a-z0-9-]/g,"")}`;
      const block   = document.createElement("div");
      block.className = "genre-carousel-block";
      block.id = blockId;

      block.innerHTML = `
        <div class="genre-carousel-header">
          <h3>${escHtml(genre)}</h3>
          <button class="see-all" type="button" data-genre="${escHtml(genre)}" tabindex="0">See all
            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
          </button>
        </div>
        <div class="carousel-wrapper">
          <div class="carousel-fade-left"></div>
          <div class="carousel-fade-right"></div>
          <button class="carousel-btn prev" aria-label="Scroll left" disabled>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
          </button>
          <div class="carousel-track-outer">
            <div class="carousel-track" id="${escHtml(blockId)}">
              ${artists.map((a, i) => artistCardHTML(a, i)).join("")}
            </div>
          </div>
          <button class="carousel-btn next" aria-label="Scroll right">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
          </button>
        </div>`;

      // Wire carousel behaviour
      const wrapper   = block.querySelector(".carousel-wrapper");
      const track     = block.querySelector(".carousel-track");
      const prevBtn   = block.querySelector(".carousel-btn.prev");
      const nextBtn   = block.querySelector(".carousel-btn.next");
      const fadeLeft  = block.querySelector(".carousel-fade-left");
      const fadeRight = block.querySelector(".carousel-fade-right");

      let idx = 0;
      const GAP = 14;
      const totalItems = artists.length;

      const visibleCount = () => {
        const w = wrapper.offsetWidth;
        if (w < 420) return 2;
        if (w < 640) return 3;
        if (w < 860) return 4;
        if (w < 1100) return 5;
        return 6;
      };

      const updateFades = () => {
        fadeLeft.style.opacity  = idx > 0 ? "1" : "0";
        fadeRight.style.opacity = idx < Math.max(0, totalItems - visibleCount()) ? "1" : "0";
      };

      const slide = () => {
        const vc     = visibleCount();
        const maxIdx = Math.max(0, totalItems - vc);
        idx          = Math.min(idx, maxIdx);
        const cardEl = track.querySelector(".artist-card");
        const cardW  = cardEl ? cardEl.offsetWidth : 0;
        track.style.transform = `translateX(-${idx * (cardW + GAP)}px)`;
        prevBtn.disabled = idx === 0;
        nextBtn.disabled = idx >= maxIdx;
        updateFades();
      };

      prevBtn.addEventListener("click", () => { idx = Math.max(0, idx - 1); slide(); });
      nextBtn.addEventListener("click", () => { idx++; slide(); });

      const ro = new ResizeObserver(slide);
      ro.observe(wrapper);
      requestAnimationFrame(slide);

      block.querySelector(".see-all").addEventListener("click", (e) => {
        e.preventDefault();
        openSeeAllOverlay(genre, artists);
      });

      return block;
    }

    // ── Artist card HTML — circular frame, no initials fallback ─────────
    function artistCardHTML(artist, index) {
      const hue  = Math.abs(hashStr(artist.name)) % 360;
      const hue2 = (hue + 55) % 360;
      const sat  = 58 + (Math.abs(hashStr(artist.name + "s")) % 18);
      const mbUrl = `https://musicbrainz.org/artist/${escHtml(artist.id)}`;

      const year    = artist["life-span"]?.begin?.slice(0, 4) ?? "";
      const country = artist.country ?? "";
      const sub     = [year, country].filter(Boolean).join(" · ") || "Artist";

      const gradStyle = `background:linear-gradient(135deg,hsl(${hue},${sat}%,50%),hsl(${hue2},${sat - 8}%,34%))`;

      let imgHtml;
      if (artist._coverUrl) {
        // Has cover art — show image, on error fall back to music-note icon (not initials)
        imgHtml = `
          <div class="artist-img-bg loading" id="bg-${escHtml(artist.id)}" ${gradStyle}>
            <img
              src="${escHtml(artist._coverUrl)}"
              alt="${escHtml(artist.name)}"
              loading="lazy"
              decoding="async"
              onload="this.parentElement.classList.remove('loading')"
              onerror="
                var bg=document.getElementById('bg-${escHtml(artist.id)}');
                if(bg){
                  bg.classList.remove('loading');
                  bg.innerHTML=musicNoteIcon();
                }
              "
            />
          </div>`;
      } else {
        // No cover art — show music-note icon on gradient (never initials)
        imgHtml = `
          <div class="artist-img-bg artist-img-placeholder" style="${gradStyle}">
            ${musicNoteIconSVG()}
          </div>`;
      }

      return `
        <a class="artist-card" href="${mbUrl}" target="_blank" rel="noopener"
           style="animation-delay:${index * 0.045}s"
           aria-label="View ${escHtml(artist.name)} on MusicBrainz">
          <div class="artist-img-wrap">
            ${imgHtml}
          </div>
          <div class="artist-name">${escHtml(artist.name)}</div>
          <div class="artist-sub">${escHtml(sub)}</div>
        </a>`;
    }

    // ── Music note SVG icon for placeholder ──────────────────────────
    function musicNoteIconSVG() {
      return `<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="width:38%;height:38%;opacity:0.75;">
        <path d="M9 18V5l12-2v13" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="6" cy="18" r="3" stroke="white" stroke-width="1.8"/>
        <circle cx="18" cy="16" r="3" stroke="white" stroke-width="1.8"/>
      </svg>`;
    }

    // Exposed to inline onerror handlers
    window.musicNoteIcon = () => {
      const wrap = document.createElement("div");
      wrap.className = "artist-img-placeholder";
      wrap.innerHTML = musicNoteIconSVG();
      return wrap.outerHTML;
    };

    // ── See All Overlay ───────────────────────────────────────────────
    function openSeeAllOverlay(genre, artists) {
      const overlay = document.getElementById("see-all-overlay");
      if (!overlay) return;

      overlay.querySelector(".see-all-genre-title").textContent = genre;
      overlay.querySelector(".see-all-count").textContent = `${artists.length} artists`;

      const grid = overlay.querySelector(".see-all-grid");
      grid.innerHTML = "";

      artists.forEach((artist, i) => {
        const hue  = Math.abs(hashStr(artist.name)) % 360;
        const hue2 = (hue + 55) % 360;
        const sat  = 58 + (Math.abs(hashStr(artist.name + "s")) % 18);
        const mbUrl = `https://musicbrainz.org/artist/${escHtml(artist.id)}`;
        const year    = artist["life-span"]?.begin?.slice(0, 4) ?? "";
        const country = artist.country ?? "";
        const badge   = [year, country].filter(Boolean).join(" · ") || "Artist";
        const gradStyle = `background:linear-gradient(135deg,hsl(${hue},${sat}%,50%),hsl(${hue2},${sat - 8}%,34%))`;

        // Same image logic as carousel — circular, no initials
        let imgHtml;
        if (artist._coverUrl) {
          imgHtml = `
            <div class="artist-img-bg loading" id="gbg-${escHtml(artist.id)}" style="${gradStyle}">
              <img src="${escHtml(artist._coverUrl)}" alt="${escHtml(artist.name)}" loading="lazy" decoding="async"
                onload="this.parentElement.classList.remove('loading')"
                onerror="var b=document.getElementById('gbg-${escHtml(artist.id)}');if(b){b.classList.remove('loading');b.innerHTML=musicNoteIcon();}" />
            </div>`;
        } else {
          imgHtml = `
            <div class="artist-img-bg artist-img-placeholder" style="${gradStyle}">
              ${musicNoteIconSVG()}
            </div>`;
        }

        const card = document.createElement("a");
        card.className = "artist-card";
        card.href = mbUrl;
        card.target = "_blank";
        card.rel = "noopener";
        card.setAttribute("aria-label", `View ${artist.name} on MusicBrainz`);
        card.style.animationDelay = `${i * 0.025}s`;
        card.innerHTML = `
          <div class="artist-img-wrap">${imgHtml}</div>
          <div class="artist-name">${escHtml(artist.name)}</div>
          <div class="artist-sub">${escHtml(badge)}</div>`;
        grid.appendChild(card);
      });

      overlay.classList.add("open");
      document.body.classList.add("overlay-open");
    }

    function closeSeeAllOverlay() {
      const overlay = document.getElementById("see-all-overlay");
      if (!overlay) return;
      overlay.classList.remove("open");
      document.body.classList.remove("overlay-open");
    }

    // ── Helpers ───────────────────────────────────────────────────────
    function hashStr(s) {
      let h = 0;
      for (let i = 0; i < s.length; i++) h = (Math.imul(31, h) + s.charCodeAt(i)) | 0;
      return h;
    }
    function escHtml(s) {
      return String(s)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }
  </script>
</head>
<body>

<!-- ═══ NAV (always rendered first, highest z-index) ═══ -->
<header class="nav">
  <div class="nav-inner">

    <!-- Brand -->
    <a href="./index.html" class="nav-brand">
      <div class="nav-mark">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none">
          <circle cx="5"  cy="14" r="2.1" fill="white" opacity="0.9"/>
          <circle cx="12" cy="12" r="2.1" fill="white"/>
          <circle cx="19" cy="7"  r="2.1" fill="white" opacity="0.85"/>
          <circle cx="19" cy="17" r="2.1" fill="white" opacity="0.55"/>
          <line x1="7"  y1="13.3" x2="10.1" y2="12.4" stroke="white" stroke-width="1.3" opacity="0.7"/>
          <line x1="14" y1="11.4" x2="17.1" y2="8.3"  stroke="white" stroke-width="1.3" opacity="0.7"/>
          <line x1="14" y1="12.7" x2="17.1" y2="15.8" stroke="white" stroke-width="1.3" opacity="0.5"/>
        </svg>
      </div>
      <span>TrackWeave</span>
    </a>

    <!-- Search -->
    <div class="nav-search-dash">
      <span class="s-icon">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
      </span>
      <input type="text" placeholder="Search artists, albums, users…" autocomplete="off" />
    </div>

    <!-- Avatar + dropdown -->
    <div class="nav-avatar-wrap" id="nav-avatar-wrap">
      <button class="nav-av-btn" id="nav-avatar" aria-label="Open account menu" aria-expanded="false">?</button>

      <div class="nav-dropdown" id="nav-dropdown" role="menu">
        <div class="drop-user">
          <div class="drop-av" id="drop-av-mini">?</div>
          <div>
            <div class="drop-name" id="drop-display-name">—</div>
            <div class="drop-handle" id="drop-username"></div>
          </div>
        </div>

        <div class="drop-items">
          <a class="drop-item" href="#">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
            </svg>
            My Profile
          </a>
          <a class="drop-item" href="#">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <circle cx="12" cy="12" r="3"/>
              <path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/>
            </svg>
            Settings
          </a>

          <div class="drop-divider"></div>

          <button class="drop-item danger" id="btn-signout" type="button">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
              <polyline points="16 17 21 12 16 7"/>
              <line x1="21" y1="12" x2="9" y2="12"/>
            </svg>
            Sign out
          </button>
        </div>
      </div>
    </div>

  </div>
</header>

<!-- ═══ SEE ALL OVERLAY (below nav in z-index, padded by nav height) ═══ -->
<div class="see-all-overlay" id="see-all-overlay" role="dialog" aria-modal="true" aria-label="See all artists">
  <div class="see-all-topbar">
    <button class="see-all-back" id="see-all-back" type="button" aria-label="Close">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      Back
    </button>
    <span class="see-all-genre-title"></span>
    <span class="see-all-count"></span>
  </div>
  <div class="see-all-body">
    <div class="see-all-grid"></div>
  </div>
</div>

<!-- ═══ DASHBOARD ═══ -->
<div id="dash-shell" hidden>

  <!-- ── Hero banner ─────────────────────────────────────────── -->
  <div class="dash-hero">
    <div class="hero-dots"></div>
    <div class="hero-inner">
      <p class="hero-eyebrow">TrackWeave Dashboard</p>
      <h1 id="dash-name">Welcome back.</h1>
      <p class="hero-sub">Discover new artists and deepen your taste across every genre you love.</p>
      <div class="hero-genres" id="hero-genres"></div>
    </div>
  </div>

  <!-- ── Main content ────────────────────────────────────────── -->
  <main>
    <div class="dash-main">
      <section class="artists-section" id="artists-section"></section>
    </div>
  </main>

</div><!-- /#dash-shell -->

<script>
  // ── Avatar dropdown ───────────────────────────────────────────
  const _wrap = document.getElementById("nav-avatar-wrap");
  const _avBtn = document.getElementById("nav-avatar");

  _avBtn.addEventListener("click", (e) => {
    e.stopPropagation();
    const open = _wrap.classList.toggle("open");
    _avBtn.setAttribute("aria-expanded", open);
  });
  document.addEventListener("click", (e) => {
    if (!_wrap.contains(e.target)) {
      _wrap.classList.remove("open");
      _avBtn.setAttribute("aria-expanded", "false");
    }
  });
  document.addEventListener("keydown", (e) => {
    if (e.key === "Escape") {
      _wrap.classList.remove("open");
      _avBtn.setAttribute("aria-expanded", "false");
    }
  });

  // ── See All overlay close ─────────────────────────────────────
  function closeSeeAllOverlay() {
    document.getElementById("see-all-overlay").classList.remove("open");
    document.body.classList.remove("overlay-open");
  }

  document.getElementById("see-all-back")?.addEventListener("click", closeSeeAllOverlay);
  document.addEventListener("keydown", (e) => {
    if (e.key === "Escape") closeSeeAllOverlay();
  });

  // ── Mirror avatar to dropdown mini-avatar ─────────────────────
  const _dropMini = document.getElementById("drop-av-mini");
  new MutationObserver(() => {
    if (_dropMini) {
      _dropMini.innerHTML = _avBtn.innerHTML;
      _dropMini.style.background = _avBtn.style.background;
    }
  }).observe(_avBtn, { childList: true, subtree: true, characterData: true });

  // ── Measure nav height for overlay offset ─────────────────────
  // Update the CSS variable whenever the nav resizes
  const navEl = document.querySelector(".nav");
  function updateNavHeight() {
    if (navEl) {
      document.documentElement.style.setProperty("--nav-height", navEl.offsetHeight + "px");
    }
  }
  updateNavHeight();
  new ResizeObserver(updateNavHeight).observe(navEl);
</script>

</body>
