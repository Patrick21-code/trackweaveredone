<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — TrackWeave</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,300;1,9..144,400;1,9..144,500&family=Instrument+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <!-- Base design system -->
  <link rel="stylesheet" href="../styles/trackweave-base.css" />
  <!-- Dashboard-specific styles -->
  <link rel="stylesheet" href="../styles/dashboard-page.css" />

  <script type="module">
    import { initializeApp }   from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut }
                               from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getFirestore, doc, getDoc }
                               from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey:            "AIzaSyBIEvBzIOtBFJpCxqM2onqFbK6Nw82AYp4",
      authDomain:        "trackweave-26cad.firebaseapp.com",
      projectId:         "trackweave-26cad",
      storageBucket:     "trackweave-26cad.firebasestorage.app",
      messagingSenderId: "906996721432",
      appId:             "1:906996721432:web:483313759725eb2022a06d"
    };

    const app  = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db   = getFirestore(app);

    // ── MusicBrainz genre → search tag mapping ───────────────────
    const GENRE_MB_MAP = {
      "Alternative":  "alternative rock",
      "Indie":        "indie rock",
      "Hip-Hop":      "hip-hop",
      "R&B":          "rhythm and blues",
      "Pop":          "pop",
      "Electronic":   "electronic",
      "Rock":         "rock",
      "Classical":    "classical",
      "Jazz":         "jazz",
      "Metal":        "heavy metal",
      "Folk":         "folk",
      "Soul":         "soul music",
      "Country":      "country",
      "Punk":         "punk rock",
      "Experimental": "experimental",
      "Latin":        "latin",
      "K-Pop":        "k-pop",
      "OPM":          "opm",
    };

    // ── Well-known MBID overrides for guaranteed cover art ────────
    // These are fallback artist MBIDs with known rich release histories.
    // Only used as absolute last resort.
    const GENRE_SEED_MBIDS = {
      "Rock":        ["b10bbbfc-cf9e-42e0-be17-e2c3e1d2600d", // The Beatles
                      "9c9f1380-2516-4fc9-a3e6-f9f61941d090", // Radiohead
                      "a74b1b7f-71a5-4011-9441-d0b5e4122711"], // Radiohead alt
      "Pop":         ["cc197bad-dc9c-440d-a5b5-d52ba2e14234", // Coldplay
                      "f4fdbb4c-e4b7-47a0-b83b-d91bbfcfa387"], // Daft Punk
      "Hip-Hop":     ["164f0d73-1234-4e2c-8743-d77bf2191051", // Kendrick
                      "13195964-ba47-4d33-91d9-05c8a80bcbff"], // DOOM
      "Electronic":  ["f4fdbb4c-e4b7-47a0-b83b-d91bbfcfa387", // Daft Punk
                      "8538e728-ca0b-4321-b7e5-cff6565dd4c0"],
      "Jazz":        ["17188607-b61e-4f53-9a42-b7d7f42b4cc9"],
      "Classical":   ["b972f589-fb0e-474e-b64a-803b0364fa75"],
    };

    // ── Global deduplicate set ────────────────────────────────────
    const usedArtistIds = new Set();

    // ── MB rate-limit helper — 1 req/sec ─────────────────────────
    let _lastMbReq = 0;
    async function mbFetch(url) {
      const now  = Date.now();
      const wait = Math.max(0, 1050 - (now - _lastMbReq));
      if (wait > 0) await new Promise(r => setTimeout(r, wait));
      _lastMbReq = Date.now();
      return fetch(url, { headers: { "User-Agent": "TrackWeave/1.0 (hello@trackweave.app)" } });
    }

    // ── Auth guard ────────────────────────────────────────────────
    onAuthStateChanged(auth, async (user) => {
      if (!user) { window.location.href = "./login.html"; return; }

      const snap = await getDoc(doc(db, "users", user.uid));
      const data = snap.exists() ? snap.data() : {};
      if (!data.onboardingComplete) { window.location.href = "./onboarding.html"; return; }

      const firstName   = data.firstName ?? (user.displayName?.split(" ")[0] ?? "Listener");
      const lastName    = data.lastName  ?? "";
      const displayName = `${firstName} ${lastName}`.trim();
      const username    = data.username  ?? "";
      const photoURL    = user.photoURL  ?? "";
      const genres      = data.favoriteGenres ?? [];

      // ── Hero header ───────────────────────────────────────────
      document.getElementById("dash-name").textContent = `Welcome back, ${firstName}.`;

      const genreChipWrap = document.getElementById("hero-genres");
      if (genres.length && genreChipWrap) {
        genreChipWrap.innerHTML = genres
          .map(g => `<span class="hero-genre-chip">${escHtml(g)}</span>`)
          .join("");
      }

      // ── Avatar ────────────────────────────────────────────────
      const setAvatar = (el) => {
        if (!el) return;
        if (photoURL) {
          el.innerHTML = `<img src="${escHtml(photoURL)}" alt="${escHtml(displayName)}" />`;
        } else {
          el.textContent = firstName.charAt(0).toUpperCase();
          el.style.background = `linear-gradient(135deg, var(--blue), #7c3aed)`;
        }
      };
      setAvatar(document.getElementById("nav-avatar"));

      document.getElementById("drop-display-name").textContent = displayName;
      document.getElementById("drop-username").textContent = username ? `@${username}` : user.email ?? "";

      document.getElementById("btn-signout").addEventListener("click", async () => {
        await signOut(auth);
        window.location.href = "./login.html";
      });

      document.getElementById("dash-shell").hidden = false;

      // ── Build carousels ────────────────────────────────────
      if (genres.length) {
        buildCarousels(genres);
      } else {
        document.getElementById("artists-section").innerHTML =
          `<p class="artists-empty">Select some genres in your profile to get personalised recommendations.</p>`;
      }
    });

    // ── Build all carousels (genres in sequence to respect rate limit) ──
    async function buildCarousels(genres) {
      const section = document.getElementById("artists-section");
      // Remove skeleton
      section.innerHTML = "";

      // Add eyebrow
      const eyebrow = document.createElement("p");
      eyebrow.className = "section-eyebrow";
      eyebrow.textContent = "Based on your taste";
      section.appendChild(eyebrow);

      // Build sequentially (MusicBrainz rate-limit friendly)
      for (let i = 0; i < genres.length; i++) {
        const genre = genres[i];
        try {
          const { artists } = await fetchArtistsForGenre(genre);
          if (!artists.length) continue;
          const block = buildCarouselBlock(genre, artists);
          block.style.animationDelay = `${i * 0.08}s`;
          section.appendChild(block);
        } catch (e) {
          console.warn(`[TrackWeave] Skipped genre "${genre}":`, e);
        }
      }

      section.insertAdjacentHTML("beforeend",
        `<p class="api-credit">Artist data via <a href="https://musicbrainz.org" target="_blank" rel="noopener">MusicBrainz</a> &amp; <a href="https://coverartarchive.org" target="_blank" rel="noopener">Cover Art Archive</a></p>`
      );
    }

    // ── Fetch artists for a genre ─────────────────────────────────
    async function fetchArtistsForGenre(genre) {
      const tag = GENRE_MB_MAP[genre] ?? genre.toLowerCase();
      const url = `https://musicbrainz.org/ws/2/artist?query=tag:(${encodeURIComponent(tag)})&limit=30&fmt=json`;

      const res = await mbFetch(url);
      if (!res.ok) throw new Error(`MusicBrainz ${res.status}`);

      const json = await res.json();
      let allArtists = (json.artists ?? []).filter(a => a.id && a.name);

      // Deduplicate globally
      const fresh = allArtists.filter(a => !usedArtistIds.has(a.id));
      const chosen = fresh.slice(0, 14);
      chosen.forEach(a => usedArtistIds.add(a.id));

      // Enrich: fetch cover art per artist (in batches of 4, non-blocking)
      const enriched = await enrichBatch(chosen);
      return { genre, artists: enriched };
    }

    // ── Enrich a batch of artists with cover images ───────────────
    async function enrichBatch(artists) {
      // Process 4 at a time to stay under rate limits
      const results = [];
      for (let i = 0; i < artists.length; i += 4) {
        const batch = artists.slice(i, i + 4);
        const enriched = await Promise.all(batch.map(a => enrichArtist(a)));
        results.push(...enriched);
      }
      return results;
    }

    // ── Multi-strategy image fetch for a single artist ────────────
    async function enrichArtist(artist) {
      // Strategy 1: release-groups of type "Album"
      try {
        const rgRes = await mbFetch(
          `https://musicbrainz.org/ws/2/release-group?artist=${artist.id}&type=album&limit=8&fmt=json`
        );
        if (rgRes.ok) {
          const rgJson = await rgRes.json();
          const groups = (rgJson["release-groups"] ?? [])
            .filter(rg => rg["primary-type"] === "Album");

          for (const rg of groups) {
            const url = await checkCoverArt(rg.id);
            if (url) { artist._coverUrl = url; return artist; }
          }
        }
      } catch { /* continue to next strategy */ }

      // Strategy 2: any release (Singles, EPs, etc.)
      try {
        const rgRes2 = await mbFetch(
          `https://musicbrainz.org/ws/2/release-group?artist=${artist.id}&limit=10&fmt=json`
        );
        if (rgRes2.ok) {
          const rgJson2 = await rgRes2.json();
          const allGroups = rgJson2["release-groups"] ?? [];

          for (const rg of allGroups) {
            const url = await checkCoverArt(rg.id);
            if (url) { artist._coverUrl = url; return artist; }
          }
        }
      } catch { /* fallback to gradient */ }

      // No image found — gradient initials will render
      return artist;
    }

    // ── Probe Cover Art Archive for a release-group ───────────────
    async function checkCoverArt(releaseGroupId) {
      try {
        // CAA returns 307 redirect for valid entries
        const caRes = await fetch(
          `https://coverartarchive.org/release-group/${releaseGroupId}/front-250`,
          { method: "HEAD", redirect: "manual" }
        );
        if (caRes.ok || caRes.status === 307 || caRes.type === "opaqueredirect") {
          return `https://coverartarchive.org/release-group/${releaseGroupId}/front-250`;
        }
      } catch { /* silent */ }
      return null;
    }

    // ── Build carousel DOM block ───────────────────────────────────
    function buildCarouselBlock(genre, artists) {
      const blockId = `c-${genre.toLowerCase().replace(/[\s&]/g,"-").replace(/[^a-z0-9-]/g,"")}`;
      const block   = document.createElement("div");
      block.className = "genre-carousel-block";

      block.innerHTML = `
        <div class="genre-carousel-header">
          <h3>${escHtml(genre)}</h3>
          <a class="see-all" href="#" tabindex="0">See all
            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
          </a>
        </div>
        <div class="carousel-wrapper">
          <div class="carousel-fade-left"></div>
          <div class="carousel-fade-right"></div>
          <button class="carousel-btn prev" aria-label="Scroll left" disabled>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
          </button>
          <div class="carousel-track-outer">
            <div class="carousel-track" id="${escHtml(blockId)}">
              ${artists.map((a, i) => artistCardHTML(a, i)).join("")}
            </div>
          </div>
          <button class="carousel-btn next" aria-label="Scroll right">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
          </button>
        </div>`;

      // Wire carousel behaviour
      const wrapper   = block.querySelector(".carousel-wrapper");
      const track     = block.querySelector(".carousel-track");
      const prevBtn   = block.querySelector(".carousel-btn.prev");
      const nextBtn   = block.querySelector(".carousel-btn.next");
      const fadeLeft  = block.querySelector(".carousel-fade-left");
      const fadeRight = block.querySelector(".carousel-fade-right");

      let idx = 0;
      const GAP = 14; // matches 0.85rem gap in CSS
      const totalItems = artists.length;

      const visibleCount = () => {
        const w = wrapper.offsetWidth;
        if (w < 420) return 2;
        if (w < 640) return 3;
        if (w < 860) return 4;
        if (w < 1100) return 5;
        return 6;
      };

      const updateFades = () => {
        fadeLeft.style.opacity  = idx > 0 ? "1" : "0";
        fadeRight.style.opacity = idx < Math.max(0, totalItems - visibleCount()) ? "1" : "0";
      };

      const slide = () => {
        const vc       = visibleCount();
        const maxIdx   = Math.max(0, totalItems - vc);
        idx            = Math.min(idx, maxIdx);
        const cardEl   = track.querySelector(".artist-card");
        const cardW    = cardEl ? cardEl.offsetWidth : 0;
        track.style.transform = `translateX(-${idx * (cardW + GAP)}px)`;
        prevBtn.disabled = idx === 0;
        nextBtn.disabled = idx >= maxIdx;
        updateFades();
      };

      prevBtn.addEventListener("click", () => { idx = Math.max(0, idx - 1); slide(); });
      nextBtn.addEventListener("click", () => { idx++; slide(); });

      const ro = new ResizeObserver(slide);
      ro.observe(wrapper);
      requestAnimationFrame(slide);

      return block;
    }

    // ── Artist card HTML ───────────────────────────────────────────
    function artistCardHTML(artist, index) {
      const hue  = Math.abs(hashStr(artist.name)) % 360;
      const hue2 = (hue + 50) % 360;
      const sat  = 58 + (Math.abs(hashStr(artist.name + "s")) % 18);
      const mbUrl = `https://musicbrainz.org/artist/${escHtml(artist.id)}`;

      // Sub-label: formed year + country
      const year    = artist["life-span"]?.begin?.slice(0, 4) ?? "";
      const country = artist.country ?? "";
      const sub     = [year, country].filter(Boolean).join(" · ") || "Artist";

      let imgHtml;
      if (artist._coverUrl) {
        // Has real image — render it; fall back to gradient on error
        imgHtml = `
          <div class="artist-img-bg" id="bg-${escHtml(artist.id)}">
            <img
              src="${escHtml(artist._coverUrl)}"
              alt="${escHtml(artist.name)}"
              loading="lazy"
              onerror="
                var bg=document.getElementById('bg-${escHtml(artist.id)}');
                if(bg){
                  bg.style.background='linear-gradient(135deg,hsl(${hue},${sat}%,54%),hsl(${hue2},${sat - 8}%,38%))';\
                  bg.innerHTML='<span class=\\'artist-initials\\'>${escHtml(initials(artist.name))}</span>';
                }
              "
            />
          </div>`;
      } else {
        // No image from API — rich gradient with initials
        imgHtml = `
          <div class="artist-img-bg" style="background:linear-gradient(135deg,hsl(${hue},${sat}%,54%),hsl(${hue2},${sat - 8}%,38%))">
            <span class="artist-initials">${escHtml(initials(artist.name))}</span>
          </div>`;
      }

      return `
        <a class="artist-card" href="${mbUrl}" target="_blank" rel="noopener"
           style="animation-delay:${index * 0.045}s"
           aria-label="View ${escHtml(artist.name)} on MusicBrainz">
          <div class="artist-img-wrap">
            ${imgHtml}
          </div>
          <div class="artist-name">${escHtml(artist.name)}</div>
          <div class="artist-sub">${escHtml(sub)}</div>
        </a>`;
    }

    // ── Helpers ───────────────────────────────────────────────────
    function hashStr(s) {
      let h = 0;
      for (let i = 0; i < s.length; i++) h = (Math.imul(31, h) + s.charCodeAt(i)) | 0;
      return h;
    }
    function initials(name) {
      return name.split(/\s+/).slice(0, 2).map(w => w[0]?.toUpperCase() ?? "").join("");
    }
    function escHtml(s) {
      return String(s)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }
  </script>
</head>
<body>

<!-- ═══ NAV ═══ -->
<header class="nav">

    <a href="./index.html" class="nav-brand">

<!-- ═══ DASHBOARD ═══ -->
<div id="dash-shell" hidden>

  <!-- ── Hero banner ─────────────────────────────────────────── -->
  <div class="dash-hero">
    <div class="hero-dots"></div>
    <div class="hero-inner">
      <p class="hero-eyebrow">TrackWeave Dashboard</p>
      <h1 id="dash-name">Welcome back.</h1>
      <p class="hero-sub">Discover new artists and deepen your taste across every genre you love.</p>
      <div class="hero-genres" id="hero-genres"></div>
    </div>
  </div>

  <!-- ── Main content ────────────────────────────────────────── -->
  <main>
    <div class="dash-main">

      <!-- Artist carousels — built by JS, one per genre -->
      <section class="artists-section" id="artists-section">

        <!-- Initial skeleton (removed once first carousel renders) -->
        <p class="section-eyebrow" id="skeleton-eyebrow">Based on your taste</p>

        <div class="genre-carousel-block" id="initial-skeleton">
          <div class="genre-carousel-header">
            <div class="sk-line" style="width:110px;height:18px;border-radius:4px;"></div>
          </div>
          <div class="carousel-skeleton">
            <div class="sk-card"><div class="sk-img"></div><div class="sk-line"></div><div class="sk-line short"></div></div>
            <div class="sk-card"><div class="sk-img"></div><div class="sk-line"></div><div class="sk-line short"></div></div>
            <div class="sk-card"><div class="sk-img"></div><div class="sk-line"></div><div class="sk-line short"></div></div>
            <div class="sk-card"><div class="sk-img"></div><div class="sk-line"></div><div class="sk-line short"></div></div>
            <div class="sk-card"><div class="sk-img"></div><div class="sk-line"></div><div class="sk-line short"></div></div>
            <div class="sk-card"><div class="sk-img"></div><div class="sk-line"></div><div class="sk-line short"></div></div>
          </div>
        </div>

      </section>

    </div>
  </main>

</div><!-- /#dash-shell -->

<script>
  // ── Remove skeleton once real content appears ─────────────────
  const _section = document.getElementById("artists-section");
  new MutationObserver(() => {
    const sk = document.getElementById("initial-skeleton");
    const se = document.getElementById("skeleton-eyebrow");
    if (sk && _section.querySelectorAll(".genre-carousel-block").length > 0) {
      sk.remove();
      if (se) se.remove();
    }
  }).observe(_section, { childList: true });

  // ── Avatar dropdown ───────────────────────────────────────────
  const _wrap = document.getElementById("nav-avatar-wrap");
  const _avBtn = document.getElementById("nav-avatar");

  _avBtn.addEventListener("click", (e) => {
    e.stopPropagation();
    const open = _wrap.classList.toggle("open");
    _avBtn.setAttribute("aria-expanded", open);
  });
  document.addEventListener("click", (e) => {
    if (!_wrap.contains(e.target)) {
      _wrap.classList.remove("open");
      _avBtn.setAttribute("aria-expanded", "false");
    }
  });
  document.addEventListener("keydown", (e) => {
    if (e.key === "Escape") {
      _wrap.classList.remove("open");
      _avBtn.setAttribute("aria-expanded", "false");
    }
  });

  // ── Mirror avatar to dropdown mini-avatar ─────────────────────
  const _dropMini = document.getElementById("drop-av-mini");
  new MutationObserver(() => {
    if (_dropMini) {
      _dropMini.innerHTML = _avBtn.innerHTML;
      _dropMini.style.background = _avBtn.style.background;
    }
  }).observe(_avBtn, { childList: true, subtree: true, characterData: true });
</script>

</body>
