<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Artist — TrackWeave</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,300;1,9..144,400;1,9..144,500&family=Instrument+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="../styles/base.css" />
  <link rel="stylesheet" href="../styles/pages/dashboard.css" />

  <style>
    /* ── Inline critical styles to work standalone ── */
    :root {
      --ink: #111820;
      --ink-soft: #374151;
      --ink-faint: #9ca3af;
      --paper: #f8f5f1;
      --paper-warm: #f0ece6;
      --rule: #e5e7eb;
      --rule-light: #f3f0ec;
      --blue: #2563eb;
      --blue-pale: #bfdbfe;
      --blue-ghost: #eff6ff;
      --red: #dc2626;
      --red-ghost: #fef2f2;
      --r-sm: 8px;
      --r-md: 14px;
      --r-lg: 20px;
      --nav-height: 72px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: 'Instrument Sans', sans-serif;
      background: var(--paper);
      color: var(--ink);
      min-height: 100%;
      overflow-x: hidden;
    }

    /* ═══════ NAV ═══════ */
    .nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 72px;
      z-index: 9000;
      background: rgba(248,245,241,0.95);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-bottom: 1px solid var(--rule);
      box-shadow: 0 1px 0 var(--rule-light), 0 4px 24px rgba(17,24,32,.04);
    }
    .nav-inner {
      max-width: 1280px; margin: 0 auto;
      height: 100%; display: flex; align-items: center;
      padding: 0 2.5rem;
    }
    .nav-brand {
      display: flex; align-items: center; gap: 0.55rem;
      text-decoration: none;
      font-family: 'Fraunces', serif; font-weight: 500;
      font-size: 1.05rem; letter-spacing: -0.02em;
      flex-shrink: 0;
      transition: opacity 0.2s;
    }
    .nav-brand:hover { opacity: 0.85; }
    .nav-brand span {
      color: var(--blue) !important;
    }
    .nav-mark {
      width: 32px; height: 32px; border-radius: 8px;
      background: var(--blue);
      display: flex; align-items: center; justify-content: center;
    }
    
    /* Navigation Links */
    .nav-links {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      margin-left: 1rem;
    }
    .nav-link {
      font-size: 0.875rem;
      color: var(--ink-soft) !important;
      font-weight: 500;
      text-decoration: none;
      transition: color 0.15s ease;
      position: relative;
      padding: 0.5rem 0;
      background: transparent !important;
      white-space: nowrap;
    }
    .nav-link:visited {
      color: var(--ink-soft) !important;
    }
    .nav-link:hover {
      color: var(--ink) !important;
      background: transparent !important;
    }
    .nav-link.active {
      color: var(--ink) !important;
      font-weight: 500;
      background: transparent !important;
    }
    .nav-link.active:visited {
      color: var(--ink) !important;
    }
    .nav-link.active::after {
      content: '';
      position: absolute;
      bottom: -20px;
      left: 0;
      right: 0;
      height: 2px;
      background: var(--blue);
      border-radius: 2px;
    }
    .nav-back-btn {
      display: flex; align-items: center; gap: 0.45rem;
      font-size: 0.82rem; font-weight: 500; color: var(--ink-soft);
      cursor: pointer; border: 1.5px solid var(--rule);
      background: transparent; border-radius: 99px;
      padding: 0.38rem 0.85rem 0.38rem 0.65rem;
      font-family: inherit; text-decoration: none;
      transition: border-color .16s, color .16s, background .16s;
      margin-left: 0;
    }
    .nav-back-btn:hover { border-color: var(--ink); color: var(--ink); background: var(--paper-warm); }
    .nav-back-btn svg { color: var(--ink-faint); transition: color .16s; }
    .nav-back-btn:hover svg { color: var(--ink); }
    .nav-avatar-wrap { position: relative; margin-left: auto; display: flex; align-items: center; gap: 0.75rem; }
    .nav-av-btn {
      width: 40px; height: 40px; border-radius: 50%;
      background: var(--blue); color: #fff;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Fraunces', serif; font-size: 1rem; font-weight: 500;
      overflow: hidden; cursor: pointer;
      border: 2.5px solid transparent;
      transition: border-color .2s, box-shadow .2s, transform .2s;
      flex-shrink: 0;
    }
    .nav-av-btn:hover { transform: scale(1.05); }
    .nav-av-btn img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
    .nav-av-btn:hover, .nav-avatar-wrap.open .nav-av-btn {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37,99,235,.18);
    }
    .nav-dropdown {
      position: absolute; top: calc(100% + 14px); right: 0;
      min-width: 240px; background: #fff;
      border: 1.5px solid var(--rule); border-radius: var(--r-md);
      box-shadow: 0 2px 8px rgba(17,24,32,.06), 0 8px 32px rgba(17,24,32,.1), 0 24px 64px rgba(17,24,32,.08);
      z-index: 9100; overflow: hidden;
      opacity: 0; pointer-events: none;
      transform: translateY(-8px) scale(0.98);
      transform-origin: top right;
      transition: opacity .2s cubic-bezier(.22,1,.36,1), transform .2s cubic-bezier(.22,1,.36,1);
    }
    .nav-avatar-wrap.open .nav-dropdown {
      opacity: 1; pointer-events: auto; transform: translateY(0) scale(1);
    }
    .drop-user {
      padding: 1.1rem 1.2rem 0.95rem;
      border-bottom: 1px solid var(--rule-light);
      display: flex; align-items: center; gap: 0.85rem;
      background: var(--paper);
    }
    .drop-av {
      width: 38px; height: 38px; border-radius: 50%;
      background: var(--blue); color: #fff; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Fraunces', serif; font-size: 1rem; font-weight: 500; overflow: hidden;
    }
    .drop-av img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
    .drop-name { font-size: 0.875rem; font-weight: 600; color: var(--ink); line-height: 1.3; }
    .drop-handle { font-size: 0.75rem; color: var(--ink-faint); margin-top: 0.12rem; font-weight: 300; }
    .drop-items { padding: 0.4rem 0; }
    .drop-item {
      display: flex; align-items: center; gap: 0.7rem;
      padding: 0.65rem 1.2rem; font-size: 0.86rem;
      color: var(--ink-soft); font-weight: 400; cursor: pointer;
      text-decoration: none;
      transition: background .14s, color .14s;
      border: none; width: 100%; background: none;
      font-family: inherit; text-align: left;
    }
    .drop-item:hover { background: var(--paper-warm); color: var(--ink); }
    .drop-item svg { flex-shrink: 0; color: var(--ink-faint); transition: color .14s; }
    .drop-item:hover svg { color: var(--blue); }
    .drop-divider { height: 1px; background: var(--rule-light); margin: 0.35rem 0; }
    .drop-item.danger { color: var(--red); }
    .drop-item.danger svg { color: var(--red); opacity: 0.7; }
    .drop-item.danger:hover { background: var(--red-ghost); }
    .drop-item.danger:hover svg { opacity: 1; }

    /* ═══════ PAGE SHELL ═══════ */
    #artist-shell { padding-top: 72px; }

    /* ═══════ HERO ═══════ */
    .artist-hero {
      position: relative; overflow: hidden;
      background: var(--ink);
      padding: 3.5rem 2.5rem;
      min-height: 360px;
    }
    .artist-hero::before {
      content: ''; position: absolute;
      top: -160px; right: -120px;
      width: 680px; height: 680px; border-radius: 50%;
      background: radial-gradient(circle, rgba(37,99,235,.2) 0%, transparent 65%);
      pointer-events: none;
    }
    .artist-hero::after {
      content: ''; position: absolute;
      bottom: -120px; left: 5%;
      width: 500px; height: 500px; border-radius: 50%;
      background: radial-gradient(circle, rgba(245,158,11,.09) 0%, transparent 65%);
      pointer-events: none;
    }
    .hero-dots {
      position: absolute; inset: 0; pointer-events: none;
      background-image: radial-gradient(circle, rgba(255,255,255,.045) 1px, transparent 1px);
      background-size: 26px 26px;
    }
    .hero-inner {
      position: relative; z-index: 1;
      max-width: 1280px; margin: 0 auto;
      display: flex; align-items: center; gap: 3.5rem;
    }

    /* ── Artist portrait ── */
    .hero-portrait-ring {
      flex-shrink: 0;
      width: 200px; height: 200px;
      border-radius: 50%;
      padding: 4px;
      background: linear-gradient(135deg, rgba(37,99,235,.7) 0%, rgba(245,158,11,.4) 100%);
      box-shadow:
        0 0 0 1px rgba(255,255,255,.08),
        0 24px 80px rgba(0,0,0,.45),
        0 8px 30px rgba(37,99,235,.25);
      position: relative;
      transition: transform .4s cubic-bezier(.22,1,.36,1);
    }
    .hero-portrait-ring:hover { transform: scale(1.03); }
    .hero-portrait {
      width: 100%; height: 100%; border-radius: 50%; overflow: hidden;
      display: flex; align-items: center; justify-content: center;
      background: var(--paper-warm);
    }
    .hero-portrait img {
      width: 100%; height: 100%; object-fit: cover; object-position: center top;
      border-radius: 50%;
    }
    .hero-portrait-placeholder {
      width: 100%; height: 100%; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
    }
    .hero-portrait-placeholder svg { width: 40%; height: 40%; opacity: 0.72; }

    /* ── Shimmer ring ── */
    .hero-portrait-ring.loading .hero-portrait {
      background: linear-gradient(90deg, #2a2f38 25%, #353b47 50%, #2a2f38 75%);
      background-size: 200% 100%;
      animation: hero-shimmer 1.4s infinite linear;
    }
    @keyframes hero-shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* ── Hero text ── */
    .hero-text { flex: 1; min-width: 0; }
    .hero-eyebrow {
      font-size: 0.68rem; font-weight: 700; letter-spacing: 0.12em;
      text-transform: uppercase; color: rgba(255,255,255,.35);
      margin-bottom: 0.65rem;
      display: flex; align-items: center; gap: 0.55rem;
    }
    .hero-eyebrow::before {
      content: ''; display: inline-block;
      width: 20px; height: 1.5px; background: var(--blue); border-radius: 2px;
    }
    .hero-artist-name {
      font-family: 'Fraunces', serif;
      font-size: clamp(2rem, 4.5vw, 3.8rem);
      font-weight: 300; font-style: italic; color: #fff;
      letter-spacing: -0.03em; line-height: 1.08; margin-bottom: 0.8rem;
    }
    .hero-meta-row {
      display: flex; align-items: center; flex-wrap: wrap; gap: 0.5rem;
      margin-bottom: 1.2rem;
    }
    .hero-badge {
      font-size: 0.68rem; font-weight: 600; letter-spacing: 0.07em;
      text-transform: uppercase;
      padding: 0.28rem 0.75rem; border-radius: 99px;
      border: 1px solid rgba(255,255,255,.14);
      color: rgba(255,255,255,.55); background: rgba(255,255,255,.07);
    }
    .hero-badge.primary {
      color: #93c5fd; border-color: rgba(37,99,235,.4);
      background: rgba(37,99,235,.15);
    }
    .hero-description {
      font-size: 0.935rem; font-weight: 300;
      color: rgba(255,255,255,.48); line-height: 1.75;
      max-width: 520px;
    }
    .hero-actions {
      display: flex; align-items: center; gap: 0.75rem; margin-top: 1.8rem;
      flex-wrap: wrap;
    }
    .hero-btn {
      display: inline-flex; align-items: center; gap: 0.5rem;
      font-size: 0.82rem; font-weight: 500; font-family: 'Instrument Sans', sans-serif;
      padding: 0.6rem 1.2rem; border-radius: 99px;
      text-decoration: none; cursor: pointer; border: none;
      transition: transform .2s, box-shadow .2s, background .2s, opacity .2s;
    }
    .hero-btn:hover { transform: translateY(-2px); }
    .hero-btn.primary {
      background: var(--blue); color: #fff;
      box-shadow: 0 4px 20px rgba(37,99,235,.4);
    }
    .hero-btn.primary:hover { box-shadow: 0 8px 32px rgba(37,99,235,.55); }
    .hero-btn.ghost {
      background: rgba(255,255,255,.08); color: rgba(255,255,255,.7);
      border: 1px solid rgba(255,255,255,.14);
    }
    .hero-btn.ghost:hover { background: rgba(255,255,255,.13); color: #fff; }

    /* ═══════ MAIN CONTENT ═══════ */
    .artist-main {
      max-width: 1280px; margin: 0 auto;
      padding: 3rem 2.5rem 6rem;
    }

    /* ── Section header ── */
    .section-header {
      display: flex; justify-content: space-between; align-items: baseline;
      margin-bottom: 1.6rem; padding-bottom: 1rem;
      border-bottom: 1px solid var(--rule);
    }
    .section-title {
      font-family: 'Fraunces', serif; font-size: 1.45rem; font-weight: 500;
      color: var(--ink); letter-spacing: -0.02em;
    }
    .section-count {
      font-size: 0.75rem; color: var(--ink-faint); font-weight: 400;
      background: var(--paper-warm); border: 1px solid var(--rule);
      border-radius: 99px; padding: 0.22rem 0.7rem;
    }

    /* ── Album carousel ── */
    .albums-section { margin-bottom: 4rem; }

    .album-carousel-wrapper {
      position: relative;
      overflow: hidden;
      padding: 1rem 0 1.5rem;
    }
    .album-carousel-fade-left, .album-carousel-fade-right {
      position: absolute; top: 0; bottom: 0; width: 80px;
      pointer-events: none; z-index: 5;
    }
    .album-carousel-fade-left {
      left: 0;
      background: linear-gradient(to right, var(--paper) 0%, transparent 100%);
    }
    .album-carousel-fade-right {
      right: 0;
      background: linear-gradient(to left, var(--paper) 0%, transparent 100%);
    }

    /* Continuous scroll animation */
    @keyframes scroll-left {
      0%   { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }

    .album-carousel-track-outer { overflow: hidden; }
    .album-carousel-track {
      display: flex; gap: 1.25rem;
      width: max-content;
      animation: scroll-left 50s linear infinite;
      will-change: transform;
    }
    .album-carousel-track:hover,
    .album-carousel-track.paused {
      animation-play-state: paused;
    }

    /* ── Album card ── */
    .album-card {
      flex: 0 0 200px;
      min-width: 0;
      display: flex; flex-direction: column;
      text-decoration: none; color: inherit;
      border-radius: var(--r-md);
      padding: 0.75rem 0.75rem 1rem;
      background: transparent;
      transition: background .2s, transform .3s cubic-bezier(.22,1,.36,1);
      animation: card-in .45s cubic-bezier(.22,1,.36,1) both;
      cursor: default;
      pointer-events: auto;
    }
    .album-card:hover {
      background: rgba(17,24,32,.04);
      transform: scale(1.06);
    }
    @keyframes card-in {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .album-cover-wrap {
      width: 100%; aspect-ratio: 1;
      border-radius: var(--r-sm);
      overflow: hidden;
      margin-bottom: 0.85rem;
      background: var(--paper-warm);
      box-shadow: 0 2px 12px rgba(17,24,32,.09), 0 6px 24px rgba(17,24,32,.06);
      transition: box-shadow .3s, transform .3s cubic-bezier(.22,1,.36,1);
      position: relative;
    }
    .album-card:hover .album-cover-wrap {
      box-shadow: 0 12px 48px rgba(17,24,32,.2), 0 4px 16px rgba(17,24,32,.1);
      transform: scale(1.03);
    }
    .album-cover-wrap img {
      width: 100%; height: 100%; object-fit: cover; display: block;
      transition: opacity .3s;
    }
    .album-cover-placeholder {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
    }
    .album-cover-placeholder svg { width: 36%; height: 36%; opacity: 0.6; }

    /* Shimmer while loading */
    .album-cover-wrap.loading {
      background: linear-gradient(90deg, #ede9e4 25%, #d8d3cd 50%, #ede9e4 75%);
      background-size: 200% 100%;
      animation: tw-shimmer 1.4s infinite linear;
    }
    @keyframes tw-shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* Type tag on cover */
    .album-type-tag {
      position: absolute; top: 8px; left: 8px;
      font-size: 0.6rem; font-weight: 700; letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0.2rem 0.55rem; border-radius: 99px;
      background: rgba(17,24,32,.72);
      color: rgba(255,255,255,.88);
      backdrop-filter: blur(6px);
      pointer-events: none;
    }

    .album-title {
      font-size: 0.85rem; font-weight: 600; color: var(--ink);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      line-height: 1.3; margin-bottom: 0.22rem;
      transition: color .15s;
    }
    .album-card:hover .album-title { color: var(--blue); }
    .album-year {
      font-size: 0.72rem; color: var(--ink-faint); font-weight: 300;
    }

    /* ── Stats strip ── */
    .artist-stats-strip {
      display: flex; gap: 1.5rem; flex-wrap: wrap;
      padding: 1.6rem 2rem; margin-bottom: 3rem;
      background: #fff; border: 1px solid var(--rule);
      border-radius: var(--r-lg);
      box-shadow: 0 2px 12px rgba(17,24,32,.04);
    }
    .stat-item {
      display: flex; flex-direction: column; gap: 0.2rem;
    }
    .stat-label {
      font-size: 0.65rem; font-weight: 700; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--ink-faint);
    }
    .stat-value {
      font-family: 'Fraunces', serif; font-size: 1.4rem;
      font-weight: 500; color: var(--ink); letter-spacing: -0.02em;
    }
    .stat-divider {
      width: 1px; background: var(--rule); align-self: stretch; margin: 0 0.25rem;
    }

    /* ── Skeleton loaders ── */
    @keyframes shimmer {
      0%   { background-position: -800px 0; }
      100% { background-position:  800px 0; }
    }
    .sk-block {
      background: linear-gradient(90deg, #e8e4df 0%, #f5f2ed 50%, #e8e4df 100%);
      background-size: 800px 100%;
      animation: shimmer 1.8s ease-in-out infinite;
      border-radius: 8px;
    }
    .sk-album-card {
      flex: 0 0 200px;
      min-width: 0;
      padding: 0.75rem 0.75rem 1rem;
    }
    .sk-cover {
      width: 100%;
      aspect-ratio: 1;
      border-radius: var(--r-sm);
      margin-bottom: 0.85rem;
    }
    .sk-line {
      height: 11px;
      border-radius: 5px;
      margin-bottom: 0.4rem;
    }
    .sk-line.short { width: 50%; }

    /* Stagger skeleton shimmer */
    .sk-album-card:nth-child(1) .sk-block { animation-delay: 0s; }
    .sk-album-card:nth-child(2) .sk-block { animation-delay: .1s; }
    .sk-album-card:nth-child(3) .sk-block { animation-delay: .2s; }
    .sk-album-card:nth-child(4) .sk-block { animation-delay: .3s; }
    .sk-album-card:nth-child(5) .sk-block { animation-delay: .4s; }

    /* ── Tags section ── */
    .artist-tags { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 0.8rem; }
    .artist-tag {
      font-size: 0.7rem; font-weight: 500; letter-spacing: 0.04em;
      padding: 0.3rem 0.75rem; border-radius: 99px;
      background: var(--blue-ghost); border: 1px solid var(--blue-pale);
      color: var(--blue); text-transform: capitalize;
    }

    /* ── No albums state ── */
    .no-albums {
      padding: 3rem; text-align: center;
      font-size: 0.9rem; color: var(--ink-faint); font-weight: 300;
    }

    /* ── Credit ── */
    .api-credit {
      margin-top: 2.5rem; padding-top: 1.5rem;
      border-top: 1px solid var(--rule-light);
      text-align: right; font-size: 0.7rem;
      color: var(--ink-faint); opacity: 0.55;
    }
    .api-credit a { color: inherit; text-decoration: underline; text-underline-offset: 2px; }

    /* ── Responsive ── */
    @media (max-width: 900px) {
      .hero-inner { flex-direction: column; gap: 2rem; align-items: flex-start; }
      .hero-portrait-ring { width: 160px; height: 160px; }
      .album-card, .sk-album-card { flex: 0 0 170px; }
    }
    @media (max-width: 640px) {
      .artist-hero { padding: 2.5rem 1.2rem; }
      .artist-main { padding: 2rem 1.2rem 4rem; }
      .nav-inner { padding: 0 1.4rem; }
      .hero-portrait-ring { width: 130px; height: 130px; }
      .album-card, .sk-album-card { flex: 0 0 150px; }
      .artist-stats-strip { padding: 1.2rem 1.4rem; gap: 1rem; }
    }
    @media (max-width: 420px) {
      .album-card, .sk-album-card { flex: 0 0 130px; }
    }
  </style>
</head>
<body>

<!-- ═══ NAV ═══ -->
<header class="nav">
  <div class="nav-inner">
    <a href="./index.html" class="nav-brand">
      <div class="nav-mark">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none">
          <circle cx="5"  cy="14" r="2.1" fill="white" opacity="0.9"/>
          <circle cx="12" cy="12" r="2.1" fill="white"/>
          <circle cx="19" cy="7"  r="2.1" fill="white" opacity="0.85"/>

<script type="module">
  import { initializeApp }   from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut }
                             from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import { getFirestore, doc, getDoc }
                             from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey:            "AIzaSyBIEvBzIOtBFJpCxqM2onqFbK6Nw82AYp4",
    authDomain:        "trackweave-26cad.firebaseapp.com",
    projectId:         "trackweave-26cad",
    storageBucket:     "trackweave-26cad.firebasestorage.app",
    messagingSenderId: "906996721432",
    appId:             "1:906996721432:web:483313759725eb2022a06d"
  };

  const app  = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db   = getFirestore(app);

  // ── Helpers ────────────────────────────────────────────────────
  function escHtml(s) {
    return String(s)
      .replace(/&/g,"&amp;").replace(/</g,"&lt;")
      .replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;");
  }

  // ── MB rate-limit helper ────────────────────────────────────────
  let _lastMbReq = 0;
  async function mbFetch(url) {
    const now  = Date.now();
    const wait = Math.max(0, 1050 - (now - _lastMbReq));
    if (wait > 0) await new Promise(r => setTimeout(r, wait));
    _lastMbReq = Date.now();
    return fetch(url, { headers: { "User-Agent": "TrackWeave/1.0 (hello@trackweave.app)" } });
  }

  // ── Music note SVG ─────────────────────────────────────────────
  function musicNoteSVG(size = "38%", opacity = "0.75") {
    return `<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="width:${size};height:${size};opacity:${opacity};">
      <path d="M9 18V5l12-2v13" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="6" cy="18" r="3" stroke="white" stroke-width="1.8"/>
      <circle cx="18" cy="16" r="3" stroke="white" stroke-width="1.8"/>
    </svg>`;
  }

  // ── CAA cover art probe ────────────────────────────────────────
  async function checkCoverArt(releaseGroupId) {
    try {
      const apiRes = await fetch(
        `https://coverartarchive.org/release-group/${releaseGroupId}`,
        { headers: { "Accept": "application/json" } }
      );
      if (apiRes.ok) {
        const json = await apiRes.json();
        const images = json.images ?? [];
        const front  = images.find(img => img.front) ?? images[0];
        if (front) {
          return front.thumbnails?.["250"]
            ?? front.thumbnails?.small
            ?? front.thumbnails?.["500"]
            ?? front.thumbnails?.large
            ?? front.image ?? null;
        }
      }
    } catch { /* fall through */ }
    try {
      const directUrl = `https://coverartarchive.org/release-group/${releaseGroupId}/front-250`;
      const r = await fetch(directUrl);
      if (r.ok) return r.url ?? directUrl;
    } catch { /* silent */ }
    return null;
  }

  // ── Auth guard ─────────────────────────────────────────────────
  onAuthStateChanged(auth, async (user) => {
    if (!user) { window.location.href = "./login.html"; return; }

    const snap = await getDoc(doc(db, "users", user.uid));
    const data = snap.exists() ? snap.data() : {};
    if (!data.onboardingComplete) { window.location.href = "./onboarding.html"; return; }

    const firstName   = data.firstName ?? (user.displayName?.split(" ")[0] ?? "Listener");
    const lastName    = data.lastName  ?? "";
    const displayName = `${firstName} ${lastName}`.trim();
    const username    = data.username  ?? "";
    const photoURL    = user.photoURL  ?? "";

    // ── Set nav avatar ──────────────────────────────────────────
    const navAvEl = document.getElementById("nav-avatar");
    if (photoURL) {
      navAvEl.innerHTML = `<img src="${escHtml(photoURL)}" alt="${escHtml(displayName)}" />`;
    } else {
      navAvEl.textContent = firstName.charAt(0).toUpperCase();
      navAvEl.style.background = `linear-gradient(135deg, var(--blue), #7c3aed)`;
    }
    document.getElementById("drop-display-name").textContent = displayName;
    document.getElementById("drop-username").textContent = username ? `@${username}` : user.email ?? "";

    document.getElementById("btn-signout").addEventListener("click", async () => {
      await signOut(auth);
      window.location.href = "./login.html";
    });

    // ── Load artist data ────────────────────────────────────────
    const params   = new URLSearchParams(window.location.search);
    const artistId = params.get("id");
    if (!artistId) { window.location.href = "./dashboard.html"; return; }

    // Try sessionStorage first
    let artist = null;
    try {
      const stored = sessionStorage.getItem("tw_artist_detail");
      if (stored) {
        const parsed = JSON.parse(stored);
        if (parsed?.id === artistId) artist = parsed;
      }
    } catch { /* ignore */ }

    if (artist) {
      renderHero(artist);
      loadAlbums(artist);
    } else {
      // Fallback: fetch from MB
      fetchArtistById(artistId).then(a => {
        if (a) { renderHero(a); loadAlbums(a); }
        else { document.getElementById("hero-artist-name").textContent = "Artist not found"; }
      });
    }
  });

  // ── Fetch artist by ID from MB ─────────────────────────────────
  async function fetchArtistById(id) {
    try {
      const res = await mbFetch(`https://musicbrainz.org/ws/2/artist/${id}?inc=tags+genres&fmt=json`);
      if (!res.ok) return null;
      const j = await res.json();
      return j;
    } catch { return null; }
  }

  // ── Render hero section ────────────────────────────────────────
  function renderHero(artist) {
    document.title = `${artist.name} — TrackWeave`;

    // Name
    document.getElementById("hero-artist-name").textContent = artist.name;

    // Portrait image - use gradient placeholder (MusicBrainz doesn't provide artist images)
    const ring     = document.getElementById("hero-portrait-ring");
    const portrait = document.getElementById("hero-portrait");
    
    ring.classList.remove("loading");
    const hue  = Math.abs(hashStr(artist.name)) % 360;
    const hue2 = (hue + 55) % 360;
    portrait.innerHTML = `<div class="hero-portrait-placeholder" style="width:100%;height:100%;border-radius:50%;background:linear-gradient(135deg,hsl(${hue},60%,44%),hsl(${hue2},52%,28%));display:flex;align-items:center;justify-content:center;">${musicNoteSVG("38%","0.75")}</div>`;

    // Meta badges
    const metaRow  = document.getElementById("hero-meta-row");
    const year     = artist["life-span"]?.begin?.slice(0, 4) ?? "";
    const yearEnd  = artist["life-span"]?.ended ? (artist["life-span"]?.end?.slice(0, 4) ?? "—") : null;
    const country  = artist.country ?? "";
    const type     = artist.type ?? "";

    if (type)    metaRow.insertAdjacentHTML("beforeend", `<span class="hero-badge primary">${escHtml(type)}</span>`);
    if (country) metaRow.insertAdjacentHTML("beforeend", `<span class="hero-badge">${escHtml(country)}</span>`);
    if (year) {
      const lifespan = yearEnd ? `${year} – ${yearEnd}` : `Est. ${year}`;
      metaRow.insertAdjacentHTML("beforeend", `<span class="hero-badge">${escHtml(lifespan)}</span>`);
    }

    // Description
    const descEl = document.getElementById("hero-description");
    const tags   = (artist.tags ?? artist.genres ?? [])
      .sort((a,b) => (b.count ?? 0) - (a.count ?? 0));
    const tagNames = tags.slice(0, 8).map(t => t.name ?? t);

    if (tagNames.length) {
      const genreList = tagNames.slice(0, 3).map(t =>
        t.split(" ").map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(" ")
      ).join(", ");
      const locationNote = country ? ` from ${country}` : "";
      const yearNote     = year ? ` active since ${year}` : "";
      descEl.textContent = `${artist.name} is a${genreList ? " " + genreList : ""}${locationNote} artist${yearNote}. Explore their full discography below.`;

      // Tag chips
      const tagsEl = document.getElementById("artist-tags");
      tagsEl.innerHTML = tagNames.map(t => `<span class="artist-tag">${escHtml(t)}</span>`).join("");
    } else {
      descEl.textContent = `Explore ${artist.name}'s complete discography and musical journey below.`;
    }

    // Action buttons
    const actionsEl = document.getElementById("hero-actions");
    const musicGraphUrl = `./engagement.html?artist=${encodeURIComponent(artist.id)}&artistName=${encodeURIComponent(artist.name)}`;
    actionsEl.innerHTML = `
      <a class="hero-btn primary" href="${escHtml(musicGraphUrl)}">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M3 12h1m8-9v1m8 8h1m-9 8v1M5.6 5.6l.7.7m12.1-.7-.7.7m.7 12.1-.7-.7M6.3 18.4l-.7.7"/><path d="M12 2a10 10 0 0 1 10 10"/></svg>
        View Music Graph
      </a>`;

  }

  // ── Load albums via MusicBrainz ────────────────────────────────
  async function loadAlbums(artist) {
    const container  = document.getElementById("albums-container");
    const countEl    = document.getElementById("albums-count");
    const statAlbums = document.getElementById("stat-albums-val");

    try {
      // Fetch release groups (albums + singles + EPs)
      const rgRes = await mbFetch(
        `https://musicbrainz.org/ws/2/release-group?artist=${encodeURIComponent(artist.id)}&limit=25&fmt=json`
      );
      if (!rgRes.ok) throw new Error("MB error");

      const rgJson = await rgRes.json();
      const releaseGroups = (rgJson["release-groups"] ?? []).sort((a, b) => {
        const ya = parseInt(a["first-release-date"]?.slice(0,4) ?? "0");
        const yb = parseInt(b["first-release-date"]?.slice(0,4) ?? "0");
        return yb - ya; // newest first
      });

      const albums = releaseGroups.filter(rg =>
        ["Album", "Single", "EP", "Live", "Compilation"].includes(rg["primary-type"])
      );

      if (statAlbums) statAlbums.textContent = albums.length;
      countEl.textContent = `${albums.length} release${albums.length !== 1 ? "s" : ""}`;

      if (!albums.length) {
        container.innerHTML = `<div class="no-albums">No releases found for this artist.</div>`;
        return;
      }

      // Fetch cover art for all albums in parallel
      const coverUrls = await Promise.all(
        albums.map(rg => checkCoverArt(rg.id).catch(() => null))
      );
      albums.forEach((rg, i) => { rg._coverUrl = coverUrls[i]; });

      // Render carousel
      container.innerHTML = "";
      const carousel = buildAlbumCarousel(albums);
      container.appendChild(carousel);

    } catch (e) {
      console.warn("[TrackWeave] Album load error:", e);
      if (statAlbums) statAlbums.textContent = "—";
      countEl.textContent = "—";
      container.innerHTML = `<div class="no-albums">Could not load discography. Please try again later.</div>`;
    }
  }

  // ── Build album carousel DOM ────────────────────────────────────
  function buildAlbumCarousel(albums) {
    const wrapper = document.createElement("div");
    wrapper.className = "album-carousel-wrapper";

    // Duplicate cards for seamless infinite loop
    const allCards = [...albums, ...albums];

    wrapper.innerHTML = `
      <div class="album-carousel-fade-left"></div>
      <div class="album-carousel-fade-right"></div>
      <div class="album-carousel-track-outer">
        <div class="album-carousel-track" id="album-track">
          ${allCards.map((rg, i) => albumCardHTML(rg, i % albums.length)).join("")}
        </div>
      </div>`;

    return wrapper;
  }

  // ── Album card HTML ─────────────────────────────────────────────
  function albumCardHTML(rg, index) {
    const title   = rg.title ?? "Untitled";
    const year    = rg["first-release-date"]?.slice(0, 4) ?? "";
    const type    = rg["primary-type"] ?? "Release";

    const hue     = Math.abs(hashStr(title)) % 360;
    const hue2    = (hue + 60) % 360;
    const gradStyle = `background:linear-gradient(135deg,hsl(${hue},52%,44%),hsl(${hue2},48%,30%))`;

    let coverHtml;
    if (rg._coverUrl) {
      coverHtml = `
        <div class="album-cover-wrap loading" id="ac-${escHtml(rg.id)}">
          <img
            src="${escHtml(rg._coverUrl)}"
            alt="${escHtml(title)}"
            loading="lazy"
            decoding="async"
            onload="this.parentElement.classList.remove('loading')"
            onerror="(function(img){
              var src=img.src;
              if(src.indexOf('250')>-1){img.src=src.replace('250','500');}
              else if(src.indexOf('500')>-1){img.src=src.replace('500','1200');}
              else{
                var p=document.getElementById('ac-${escHtml(rg.id)}');
                if(p){p.classList.remove('loading');p.style.cssText='${gradStyle}';p.innerHTML='<div class=\\'album-cover-placeholder\\'>${musicNoteSVG("36%","0.6").replace(/'/g,"\\'").replace(/"/g,"&quot;")}</div><span class=\\'album-type-tag\\'>${escHtml(type)}</span>';}
              }
            })(this)"
          />
          <span class="album-type-tag">${escHtml(type)}</span>
        </div>`;
    } else {
      coverHtml = `
        <div class="album-cover-wrap" style="${gradStyle}">
          <div class="album-cover-placeholder">${musicNoteSVG("36%","0.6")}</div>
          <span class="album-type-tag">${escHtml(type)}</span>
        </div>`;
    }

    return `
      <div class="album-card"
         style="animation-delay:${index * 0.055}s"
         aria-label="${escHtml(title)}${year ? " (" + year + ")" : ""}">
        ${coverHtml}
        <div class="album-title">${escHtml(title)}</div>
        <div class="album-year">${escHtml(year || "—")}</div>
      </div>`;
  }

  // ── hashStr helper ─────────────────────────────────────────────
  function hashStr(s) {
    let h = 0;
    for (let i = 0; i < s.length; i++) h = (Math.imul(31, h) + s.charCodeAt(i)) | 0;
    return h;
  }
</script>

<script>
  // ── Avatar dropdown ────────────────────────────────────────────
  const _wrap  = document.getElementById("nav-avatar-wrap");
  const _avBtn = document.getElementById("nav-avatar");
  _avBtn.addEventListener("click", e => {
    e.stopPropagation();
    const open = _wrap.classList.toggle("open");
    _avBtn.setAttribute("aria-expanded", open);
  });
  document.addEventListener("click", e => {
    if (!_wrap.contains(e.target)) {
      _wrap.classList.remove("open");
      _avBtn.setAttribute("aria-expanded", "false");
    }
  });
  document.addEventListener("keydown", e => {
    if (e.key === "Escape") {
      _wrap.classList.remove("open");
      _avBtn.setAttribute("aria-expanded", "false");
    }
  });
  // Mirror to dropdown mini-avatar
  const _dropMini = document.getElementById("drop-av-mini");
  new MutationObserver(() => {
    if (_dropMini) {
      _dropMini.innerHTML = _avBtn.innerHTML;
      _dropMini.style.background = _avBtn.style.background;
    }
  }).observe(_avBtn, { childList: true, subtree: true, characterData: true });
</script>
