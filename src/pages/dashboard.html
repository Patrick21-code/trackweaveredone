<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — TrackWeave</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,300;1,9..144,400;1,9..144,500&family=Instrument+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <!-- Base design system -->
  <link rel="stylesheet" href="../styles/base.css" />
  <!-- Dashboard-specific styles -->
  <link rel="stylesheet" href="../styles/pages/dashboard.css" />


  <script type="module">
    import { initializeApp }   from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut }
                               from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getFirestore, doc, getDoc }
                               from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey:            "AIzaSyBIEvBzIOtBFJpCxqM2onqFbK6Nw82AYp4",
      authDomain:        "trackweave-26cad.firebaseapp.com",
      projectId:         "trackweave-26cad",
      storageBucket:     "trackweave-26cad.firebasestorage.app",
      messagingSenderId: "906996721432",
      appId:             "1:906996721432:web:483313759725eb2022a06d"
    };

    const app  = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db   = getFirestore(app);

    // ── MusicBrainz genre → search tag mapping ───────────────────
    const GENRE_MB_MAP = {
      "Alternative":  "alternative rock",
      "Indie":        "indie rock",
      "Hip-Hop":      "hip-hop",
      "R&B":          "rhythm and blues",
      "Pop":          "pop",
      "Electronic":   "electronic",
      "Rock":         "rock",
      "Classical":    "classical",
      "Jazz":         "jazz",
      "Metal":        "heavy metal",
      "Folk":         "folk",
      "Soul":         "soul music",
      "Country":      "country",
      "Punk":         "punk rock",
      "Experimental": "experimental",
      "Latin":        "latin",
      "K-Pop":        "k-pop",
      "OPM":          "opm",
    };

    // ── Session cache — survives page interactions, clears on tab close ──
    // This caching strategy significantly improves performance by storing fetched artist data
    // in the browser's session storage. When users navigate between pages and return to the
    // dashboard, cached data loads instantly without requiring new API calls. The 60-minute
    // TTL ensures that users see fresh, up-to-date artist recommendations while minimizing
    // unnecessary network requests and respecting MusicBrainz API rate limits.
    // Key: "tw_artists_<genre>", Value: JSON-stringified artist array with metadata
    const CACHE_PREFIX = "tw_artists_";
    const CACHE_TTL_MS = 60 * 60 * 1000; // 60 minutes - balances freshness with performance

    function cacheGet(genre) {
      try {
        const raw = sessionStorage.getItem(CACHE_PREFIX + genre);
        if (!raw) return null;
        const { ts, data } = JSON.parse(raw);
        if (Date.now() - ts > CACHE_TTL_MS) { sessionStorage.removeItem(CACHE_PREFIX + genre); return null; }
        return data;
      } catch { return null; }
    }
    function cacheSet(genre, data) {
      try { sessionStorage.setItem(CACHE_PREFIX + genre, JSON.stringify({ ts: Date.now(), data })); } catch { /* storage full */ }
    }

    // ── Global deduplicate set ────────────────────────────────────
    const usedArtistIds = new Set();

    // ── MB rate-limit helper — 1 req/sec ─────────────────────────
    let _lastMbReq = 0;
    async function mbFetch(url) {
      const now  = Date.now();
      const wait = Math.max(0, 1050 - (now - _lastMbReq));
      if (wait > 0) await new Promise(r => setTimeout(r, wait));
      _lastMbReq = Date.now();
      const res = await fetch(url, { headers: { "User-Agent": "TrackWeave/1.0 (hello@trackweave.app)" } });
      return res;
    }

    // ── Auth guard ────────────────────────────────────────────────
    onAuthStateChanged(auth, async (user) => {
      if (!user) { window.location.href = "./login.html"; return; }

      const snap = await getDoc(doc(db, "users", user.uid));
      const data = snap.exists() ? snap.data() : {};
      if (!data.onboardingComplete) { window.location.href = "./onboarding.html"; return; }

      const firstName   = data.firstName ?? (user.displayName?.split(" ")[0] ?? "Listener");
      const lastName    = data.lastName  ?? "";
      const displayName = `${firstName} ${lastName}`.trim();
      const username    = data.username  ?? "";
      const photoURL    = user.photoURL  ?? "";
      const genres      = data.favoriteGenres ?? [];

      // ── Hero header ───────────────────────────────────────────
      document.getElementById("dash-name").textContent = `Welcome back, ${firstName}.`;

      const genreChipWrap = document.getElementById("hero-genres");
      if (genres.length && genreChipWrap) {
        genreChipWrap.innerHTML = genres
          .map(g => `<span class="hero-genre-chip" data-genre="${escHtml(g)}">${escHtml(g)}</span>`)
          .join("");
        genreChipWrap.querySelectorAll(".hero-genre-chip").forEach(chip => {
          chip.addEventListener("click", () => {
            const genre = chip.dataset.genre;
            const blockId = "c-" + genre.toLowerCase().replace(/[\s&]/g,"-").replace(/[^a-z0-9-]/g,"");
            const target = document.getElementById(blockId);
            if (target) {
              const navH = document.querySelector(".nav")?.offsetHeight ?? 72;
              const y = target.getBoundingClientRect().top + window.scrollY - navH - 24;
              window.scrollTo({ top: y, behavior: "smooth" });
            }
          });
        });
      }

      // ── Avatar ────────────────────────────────────────────────
      const setAvatar = (el) => {
        if (!el) return;
        if (photoURL) {
          el.innerHTML = `<img src="${escHtml(photoURL)}" alt="${escHtml(displayName)}" />`;
        } else {
          el.textContent = firstName.charAt(0).toUpperCase();
          el.style.background = `linear-gradient(135deg, var(--blue), #7c3aed)`;
        }
      };
      setAvatar(document.getElementById("nav-avatar"));

      document.getElementById("drop-display-name").textContent = displayName;
      document.getElementById("drop-username").textContent = username ? `@${username}` : user.email ?? "";

      document.getElementById("btn-signout").addEventListener("click", async () => {
        await signOut(auth);
        window.location.href = "./login.html";
      });

      document.getElementById("dash-shell").hidden = false;

      // ── Build carousels ────────────────────────────────────
      if (genres.length) {
        buildCarousels(genres);
      } else {
        document.getElementById("artists-section").innerHTML =
          `<p class="artists-empty">Select some genres in your profile to get personalised recommendations.</p>`;
      }
    });

    // ── Build all carousels — skeletons shown immediately ──────────────
    // This function orchestrates the loading and display of artist carousels for each genre.
    // It implements a progressive loading strategy where skeleton placeholders are shown
    // immediately to provide visual feedback, then replaced with actual content as data loads.
    // 
    // Performance strategy:
    // 1. Render skeleton UI instantly for perceived performance
    // 2. Check cache first for immediate data availability (no API delay)
    // 3. Stagger uncached API requests to respect rate limits
    // 4. Replace skeletons progressively as each genre's data becomes available
    // 5. Ensure ALL genres are attempted - no silent failures
    // 
    // This approach ensures the page feels fast and responsive even when fetching
    // data from external APIs, significantly improving the user experience.
    async function buildCarousels(genres) {
      const section = document.getElementById("artists-section");
      section.innerHTML = "";

      const eyebrow = document.createElement("p");
      eyebrow.className = "section-eyebrow";
      eyebrow.textContent = "Trending now · Popular artists of today";
      section.appendChild(eyebrow);

      // 1. Render all skeleton blocks immediately for instant visual feedback
      // This creates the perception of a fast-loading page while data fetches in the background
      const skeletonBlocks = {};
      genres.forEach(genre => {
        const blockId = "c-" + genre.toLowerCase().replace(/[\s&]/g,"-").replace(/[^a-z0-9-]/g,"");
        const sk = document.createElement("div");
        sk.className = "genre-carousel-block skeleton-block";
        sk.id = `sk-${blockId}`;
        sk.innerHTML = `
          <div class="genre-carousel-header">
            <div class="sk-title-bar"></div>
          </div>
          <div class="carousel-skeleton">
            ${Array(8).fill(0).map(() => `
              <div class="sk-card">
                <div class="sk-img" style="border-radius:50%"></div>
                <div class="sk-line"></div>
                <div class="sk-line short"></div>
              </div>`).join("")}
          </div>`;
        section.appendChild(sk);
        skeletonBlocks[genre] = sk;
      });

      const creditEl = document.createElement("p");
      creditEl.className = "api-credit";
      creditEl.innerHTML = `Artist data via <a href="https://musicbrainz.org" target="_blank" rel="noopener">MusicBrainz</a> &amp; <a href="https://coverartarchive.org" target="_blank" rel="noopener">Cover Art Archive</a>`;
      section.appendChild(creditEl);

      // 2. Fetch genres with intelligent caching and rate limiting
      // Cached genres resolve instantly without API calls, providing immediate content.
      // Uncached genres are staggered to respect MusicBrainz rate limits (1 request per second).
      // This hybrid approach optimizes for both speed and API compliance.
      let mbSlot = 0; // API request slot counter for rate limiting
      const STAGGER_MS = 1100; // Slightly over 1 second to safely respect rate limits

      // Track which genres have been successfully loaded to ensure completeness
      const loadedGenres = new Set();
      const failedGenres = new Set();

      const promises = genres.map(async (genre) => {
        try {
          // Check cache first — instant resolution with no network delay
          const cached = cacheGet(genre);
          if (cached && cached.length > 0) { // Accept any cached data, even if less than 20
            try {
              // Re-mark used IDs from cache to prevent duplicates
              cached.forEach(a => usedArtistIds.add(a.id));
              loadedGenres.add(genre);
              return { genre, artists: cached, fromCache: true };
            } catch (err) {
              console.warn(`Cache read failed for ${genre}, fetching fresh data:`, err);
              // Fall through to API fetch
            }
          }

          // Not cached or insufficient cached data — assign an API slot and wait for our turn
          const mySlot = mbSlot++;
          if (mySlot > 0) {
            await new Promise(r => setTimeout(r, mySlot * STAGGER_MS));
          }

          // Fetch fresh data from API
          const result = await fetchArtistsForGenre(genre);
          
          // Cache any valid results (even if less than 20 artists)
          if (result.artists.length > 0) {
            cacheSet(genre, result.artists);
            loadedGenres.add(genre);
            if (result.artists.length < 20) {
              console.log(`[TrackWeave] Genre "${genre}" has ${result.artists.length} artists (less than target of 20)`);
            }
          } else {
            // No artists found - mark as failed
            failedGenres.add(genre);
            console.error(`[TrackWeave] Genre "${genre}" returned no artists - this genre will not be displayed`);
          }
          
          return { ...result, fromCache: false };
        } catch (e) {
          failedGenres.add(genre);
          console.error(`[TrackWeave] Failed to fetch artists for "${genre}":`, e);
          return { genre, artists: [], error: e.message };
        }
      });

      // 3. As each promise resolves, swap its skeleton for the real carousel
      // This progressive rendering approach makes the page feel faster by showing
      // content as soon as it's available rather than waiting for all data to load
      const results = await Promise.allSettled(promises);
      
      results.forEach((result, index) => {
        const genre = genres[index];
        const sk = skeletonBlocks[genre];
        
        if (result.status === 'fulfilled') {
          const { artists, fromCache } = result.value;
          
          // Skip genres with no artists (failed fetch or no images available)
          if (!artists || artists.length === 0) {
            sk?.remove();
            return;
          }
          
          const block = buildCarouselBlock(genre, artists);
          if (sk) {
            section.insertBefore(block, sk);
            sk.remove();
          } else {
            section.insertBefore(block, creditEl);
          }
        } else {
          // Promise rejected - remove skeleton and log error
          console.error(`[TrackWeave] Promise rejected for genre "${genre}":`, result.reason);
          sk?.remove();
        }
      });

      // 4. Log summary of loading results for debugging
      console.log(`[TrackWeave] Dashboard loaded: ${loadedGenres.size}/${genres.length} genres successful`);
      if (failedGenres.size > 0) {
        console.warn(`[TrackWeave] Failed genres:`, Array.from(failedGenres).join(', '));
      }
    }

    // ── Fetch artists for a genre ─────────────────────────────────────
    // This function retrieves the most popular contemporary artists for a given genre.
    // It prioritizes artists who are currently trending and relevant to teenage audiences,
    // ensuring that the displayed artists are recognizable and engaging for our target demographic.
    // The function implements a fallback strategy: first try contemporary artists (2010+),
    // then expand to 2000+ if needed, ensuring every genre displays content.
    async function fetchArtistsForGenre(genre) {
      const tag = GENRE_MB_MAP[genre] ?? genre.toLowerCase();
      const currentYear = new Date().getFullYear();
      
      // Strategy 1: Try contemporary artists first (2010 onwards)
      let allArtists = await fetchArtistsByDateRange(tag, 2010, currentYear);
      
      // Strategy 2: If we don't have enough, expand to 2000 onwards
      if (allArtists.length < 30) {
        console.log(`[TrackWeave] Genre "${genre}" has limited 2010+ artists, expanding to 2000+`);
        allArtists = await fetchArtistsByDateRange(tag, 2000, currentYear);
      }
      
      // Strategy 3: If still not enough, get any artists with the tag (no date filter)
      if (allArtists.length < 20) {
        console.log(`[TrackWeave] Genre "${genre}" has limited recent artists, fetching all available`);
        const url = `https://musicbrainz.org/ws/2/artist?query=tag:(${encodeURIComponent(tag)}) AND type:person&limit=200&fmt=json`;
        const res = await mbFetch(url);
        if (res.ok) {
          const json = await res.json();
          allArtists = (json.artists ?? []).filter(a => a.id && a.name && a.type === "Person");
        }
      }

      // Sort by MusicBrainz relevance score (higher score = more popular/relevant)
      allArtists.sort((a, b) => (b.score ?? 0) - (a.score ?? 0));

      // Filter out artists we've already used to avoid duplicates across genre carousels
      const fresh = allArtists.filter(a => !usedArtistIds.has(a.id));
      
      // Take top 50 candidates to ensure we get at least 20 with images
      // This larger pool accounts for artists that may not have cover art available
      const candidates = fresh.slice(0, 50);
      
      if (candidates.length === 0) {
        console.warn(`[TrackWeave] No unique artists found for genre "${genre}"`);
        return { genre, artists: [] };
      }
      
      // Enrich with images and filter to only artists with successful image retrieval
      const enriched = await enrichBatchWithImageValidation(candidates);
      
      // Take up to 20 artists that have images (or whatever we got if less)
      const chosen = enriched.slice(0, 20);
      chosen.forEach(a => usedArtistIds.add(a.id));

      console.log(`[TrackWeave] Genre "${genre}": ${chosen.length} artists loaded`);
      return { genre, artists: chosen };
    }

    // Helper function to fetch artists by date range
    async function fetchArtistsByDateRange(tag, startYear, endYear) {
      const url = `https://musicbrainz.org/ws/2/artist?query=tag:(${encodeURIComponent(tag)}) AND begin:[${startYear} TO ${endYear}] AND type:person&limit=200&fmt=json`;
      
      try {
        const res = await mbFetch(url);
        if (!res.ok) return [];
        
        const json = await res.json();
        return (json.artists ?? []).filter(a => a.id && a.name && a.type === "Person");
      } catch (err) {
        console.warn(`Failed to fetch artists for tag "${tag}" in range ${startYear}-${endYear}:`, err);
        return [];
      }
    }

    // ── Enrich artists with cover art and validate image availability ─────────
    // This optimized pipeline fetches album cover art for artists while ensuring
    // that only artists with valid, accessible images are returned. This improves
    // both performance and visual consistency of the dashboard.
    // 
    // Performance optimizations:
    // 1. Parallel processing of release group fetches (with rate limiting)
    // 2. Concurrent image validation across all artists
    // 3. Early termination when sufficient artists with images are found
    // 4. Efficient filtering to prioritize artists with recent, popular releases
    async function enrichBatchWithImageValidation(artists) {
      const artistsWithImages = [];
      const candidateMap = new Map(); // artistId → release group IDs
      
      // Step 1: Fetch release groups for all artists in parallel batches
      // We process 5 artists at a time to respect MusicBrainz rate limits while
      // achieving better performance than sequential processing.
      const BATCH_SIZE = 5;
      for (let i = 0; i < artists.length; i += BATCH_SIZE) {
        const batch = artists.slice(i, i + BATCH_SIZE);
        
        await Promise.all(batch.map(async (artist) => {
          try {
            // Fetch albums - try to get as many as possible to maximize image chances
            const rgRes = await mbFetch(
              `https://musicbrainz.org/ws/2/release-group?artist=${artist.id}&limit=20&fmt=json`
            );
            
            if (rgRes.ok) {
              const j = await rgRes.json();
              const releaseGroups = j["release-groups"] ?? [];
              
              // Sort by first release date (most recent first) to prioritize current albums
              releaseGroups.sort((a, b) => {
                const dateA = a["first-release-date"] ?? "0000";
                const dateB = b["first-release-date"] ?? "0000";
                return dateB.localeCompare(dateA);
              });
              
              // Take up to 15 release groups as candidates (increased for better coverage)
              // Prioritize albums but include EPs and singles as fallback
              const albums = releaseGroups.filter(rg => rg["primary-type"] === "Album").slice(0, 10);
              const eps = releaseGroups.filter(rg => rg["primary-type"] === "EP").slice(0, 3);
              const singles = releaseGroups.filter(rg => rg["primary-type"] === "Single").slice(0, 2);
              
              const ids = [...albums, ...eps, ...singles].map(rg => rg.id);
              
              if (ids.length > 0) {
                candidateMap.set(artist.id, ids);
              }
            }
          } catch (err) {
            console.warn(`Failed to fetch releases for ${artist.name}:`, err);
          }
        }));
      }

      // Step 2: Probe Cover Art Archive for all artists concurrently
      // CAA has no strict rate limits, so we can check all artists in parallel
      const imagePromises = artists.map(async (artist) => {
        const rgIds = candidateMap.get(artist.id) ?? [];
        
        if (rgIds.length === 0) return null; // Skip artists with no release groups
        
        // Try release groups in order (most recent first) until we find a valid image
        for (const rgId of rgIds) {
          const coverUrl = await checkCoverArt(rgId);
          if (coverUrl) {
            artist._coverUrl = coverUrl;
            return artist;
          }
        }
        return null; // No valid image found
      });

      // Wait for all image checks to complete
      const results = await Promise.all(imagePromises);
      
      // Filter out null results (artists without images) and return only valid artists
      const validArtists = results.filter(artist => artist !== null);
      
      console.log(`[TrackWeave] Image enrichment: ${validArtists.length}/${artists.length} artists have cover art`);
      
      return validArtists;
    }

    // ── Probe Cover Art Archive for a release-group ───────────────────
    // This function attempts to retrieve album cover art from the Cover Art Archive.
    // It uses multiple fallback strategies to maximize the chances of finding a valid image.
    // The function prioritizes smaller thumbnail sizes (250px) for faster loading times
    // while maintaining visual quality suitable for the dashboard display.
    async function checkCoverArt(releaseGroupId) {
      try {
        // Strategy 1: Use CAA JSON API for reliable, CORS-friendly access
        // This API provides structured data with multiple image size options
        const apiRes = await fetch(
          `https://coverartarchive.org/release-group/${releaseGroupId}`,
          { 
            headers: { "Accept": "application/json" },
            // Add timeout to prevent slow requests from blocking the UI
            signal: AbortSignal.timeout(5000)
          }
        );
        
        if (apiRes.ok) {
          const json = await apiRes.json();
          const images = json.images ?? [];
          
          // Prioritize front cover images, fall back to any available image
          const front = images.find(img => img.front) ?? images[0];
          
          if (front) {
            // Return the most appropriate thumbnail size for dashboard display
            // 250px provides good quality while keeping file sizes small for fast loading
            return front.thumbnails?.["250"]
              ?? front.thumbnails?.small
              ?? front.thumbnails?.["500"]
              ?? front.thumbnails?.large
              ?? front.image
              ?? null;
          }
        }
      } catch (err) {
        // Silently handle errors (timeouts, network issues, etc.)
        // We'll try the fallback strategy below
      }

      try {
        // Strategy 2: Direct CDN access as fallback
        // Attempt to fetch the 250px thumbnail directly from the CDN
        // This sometimes works even when the JSON API fails
        const directUrl = `https://coverartarchive.org/release-group/${releaseGroupId}/front-250`;
        const directRes = await fetch(directUrl, {
          signal: AbortSignal.timeout(5000)
        });
        
        if (directRes.ok) {
          return directRes.url ?? directUrl;
        }
      } catch (err) {
        // Both strategies failed - return null to indicate no image available
      }

      return null;
    }

    // ── Build carousel DOM block ──────────────────────────────────────
    function buildCarouselBlock(genre, artists) {
      const blockId = `c-${genre.toLowerCase().replace(/[\s&]/g,"-").replace(/[^a-z0-9-]/g,"")}`;
      const block   = document.createElement("div");
      block.className = "genre-carousel-block";
      block.id = blockId;

      block.innerHTML = `
        <div class="genre-carousel-header">
          <h3>${escHtml(genre)}</h3>
          <button class="see-all" type="button" data-genre="${escHtml(genre)}" tabindex="0">See all
            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
          </button>
        </div>
        <div class="carousel-wrapper">
          <div class="carousel-fade-left"></div>
          <div class="carousel-fade-right"></div>
          <button class="carousel-btn prev" aria-label="Scroll left" disabled>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
          </button>
          <div class="carousel-track-outer">
            <div class="carousel-track" id="${escHtml(blockId)}">
              ${artists.map((a, i) => artistCardHTML(a, i)).join("")}
            </div>
          </div>
          <button class="carousel-btn next" aria-label="Scroll right">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
          </button>
        </div>`;

      // Wire carousel behaviour
      const wrapper   = block.querySelector(".carousel-wrapper");
      const track     = block.querySelector(".carousel-track");
      const prevBtn   = block.querySelector(".carousel-btn.prev");
      const nextBtn   = block.querySelector(".carousel-btn.next");
      const fadeLeft  = block.querySelector(".carousel-fade-left");
      const fadeRight = block.querySelector(".carousel-fade-right");

      let idx = 0;
      const GAP = 14;
      const totalItems = artists.length;

      const visibleCount = () => {
        const w = wrapper.offsetWidth;
        if (w < 420) return 2;
        if (w < 640) return 3;
        if (w < 860) return 4;
        if (w < 1100) return 5;
        return 6;
      };

      const updateFades = () => {
        fadeLeft.style.opacity  = idx > 0 ? "1" : "0";
        fadeRight.style.opacity = idx < Math.max(0, totalItems - visibleCount()) ? "1" : "0";
      };

      const slide = () => {
        const vc     = visibleCount();
        const maxIdx = Math.max(0, totalItems - vc);
        idx          = Math.min(idx, maxIdx);
        const cardEl = track.querySelector(".artist-card");
        const cardW  = cardEl ? cardEl.offsetWidth : 0;
        track.style.transform = `translateX(-${idx * (cardW + GAP)}px)`;
        prevBtn.disabled = idx === 0;
        nextBtn.disabled = idx >= maxIdx;
        updateFades();
      };

      prevBtn.addEventListener("click", () => { idx = Math.max(0, idx - 1); slide(); });
      nextBtn.addEventListener("click", () => { idx++; slide(); });

      const ro = new ResizeObserver(slide);
      ro.observe(wrapper);
      requestAnimationFrame(slide);

      block.querySelector(".see-all").addEventListener("click", (e) => {
        e.preventDefault();
        openSeeAllOverlay(genre, artists);
      });

      return block;
    }

    // ── Store artist in sessionStorage and navigate to detail page ──────
    function navigateToArtist(artist) {
      try {
        sessionStorage.setItem("tw_artist_detail", JSON.stringify(artist));
      } catch { /* storage full */ }
      window.location.href = `./artist-details.html?id=${encodeURIComponent(artist.id)}`;
    }
    window._navigateToArtist = navigateToArtist;

    // ── Artist card HTML — circular frame, no initials fallback ─────────
    function artistCardHTML(artist, index) {
      const hue  = Math.abs(hashStr(artist.name)) % 360;
      const hue2 = (hue + 55) % 360;
      const sat  = 58 + (Math.abs(hashStr(artist.name + "s")) % 18);

      const year    = artist["life-span"]?.begin?.slice(0, 4) ?? "";
      const country = artist.country ?? "";
      const sub     = [year, country].filter(Boolean).join(" · ") || "Artist";

      const gradStyle = `background:linear-gradient(135deg,hsl(${hue},${sat}%,50%),hsl(${hue2},${sat - 8}%,34%))`;
      const artistDataAttr = `data-artist-id="${escHtml(artist.id)}"`;

      let imgHtml;
      if (artist._coverUrl) {
        imgHtml = `
          <div class="artist-img-bg loading" id="bg-${escHtml(artist.id)}" style="${gradStyle}">
            <img
              src="${escHtml(artist._coverUrl)}"
              alt="${escHtml(artist.name)}"
              loading="lazy"
              decoding="async"
              onload="this.parentElement.classList.remove('loading')"
              onerror="(function(img){
                var src=img.src;
                if(src.indexOf('250')>-1){
                  img.src=src.replace('250','500');
                } else if(src.indexOf('500')>-1){
                  img.src=src.replace('500','1200');
                } else {
                  var bg=document.getElementById('bg-${escHtml(artist.id)}');
                  if(bg){bg.classList.remove('loading');bg.innerHTML=musicNoteIcon();}
                }
              })(this)"
            />
          </div>`;
      } else {
        imgHtml = `
          <div class="artist-img-bg artist-img-placeholder" style="${gradStyle}">
            ${musicNoteIconSVG()}
          </div>`;
      }

      return `
        <a class="artist-card" href="./artist-details.html?id=${escHtml(artist.id)}"
           ${artistDataAttr}
           style="animation-delay:${index * 0.045}s"
           aria-label="View ${escHtml(artist.name)}"
           onclick="event.preventDefault(); window._navigateToArtist(${escHtml(JSON.stringify(artist))})">
          <div class="artist-img-wrap">
            ${imgHtml}
          </div>
          <div class="artist-name">${escHtml(artist.name)}</div>
          <div class="artist-sub">${escHtml(sub)}</div>
        </a>`;
    }

    // ── Music note SVG icon for placeholder ──────────────────────────
    function musicNoteIconSVG() {
      return `<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="width:38%;height:38%;opacity:0.75;">
        <path d="M9 18V5l12-2v13" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="6" cy="18" r="3" stroke="white" stroke-width="1.8"/>
        <circle cx="18" cy="16" r="3" stroke="white" stroke-width="1.8"/>
      </svg>`;
    }

    // Exposed to inline onerror handlers
    window.musicNoteIcon = () => {
      const wrap = document.createElement("div");
      wrap.className = "artist-img-placeholder";
      wrap.innerHTML = musicNoteIconSVG();
      return wrap.outerHTML;
    };

    // ── See All Overlay ───────────────────────────────────────────────
    function openSeeAllOverlay(genre, artists) {
      const overlay = document.getElementById("see-all-overlay");
      if (!overlay) return;

      overlay.querySelector(".see-all-genre-title").textContent = genre;
      overlay.querySelector(".see-all-count").textContent = `${artists.length} artists`;

      const grid = overlay.querySelector(".see-all-grid");
      grid.innerHTML = "";

      artists.forEach((artist, i) => {
        const hue  = Math.abs(hashStr(artist.name)) % 360;
        const hue2 = (hue + 55) % 360;
        const sat  = 58 + (Math.abs(hashStr(artist.name + "s")) % 18);
        const mbUrl = `https://musicbrainz.org/artist/${escHtml(artist.id)}`;
        const year    = artist["life-span"]?.begin?.slice(0, 4) ?? "";
        const country = artist.country ?? "";
        const badge   = [year, country].filter(Boolean).join(" · ") || "Artist";
        const gradStyle = `background:linear-gradient(135deg,hsl(${hue},${sat}%,50%),hsl(${hue2},${sat - 8}%,34%))`;

        // Same image logic as carousel — circular, no initials
        let imgHtml;
        if (artist._coverUrl) {
          imgHtml = `
            <div class="artist-img-bg loading" id="gbg-${escHtml(artist.id)}" style="${gradStyle}">
              <img src="${escHtml(artist._coverUrl)}" alt="${escHtml(artist.name)}" loading="lazy" decoding="async"
                onload="this.parentElement.classList.remove('loading')"
                onerror="(function(img){var src=img.src;if(src.indexOf('250')>-1){img.src=src.replace('250','500');}else if(src.indexOf('500')>-1){img.src=src.replace('500','1200');}else{var b=document.getElementById('gbg-${escHtml(artist.id)}');if(b){b.classList.remove('loading');b.innerHTML=musicNoteIcon();}}})(this)" />
            </div>`;
        } else {
          imgHtml = `
            <div class="artist-img-bg artist-img-placeholder" style="${gradStyle}">
              ${musicNoteIconSVG()}
            </div>`;
        }

        const card = document.createElement("a");
        card.className = "artist-card";
        card.href = `./artist-details.html?id=${encodeURIComponent(artist.id)}`;
        card.setAttribute("aria-label", `View ${artist.name}`);
        card.style.animationDelay = `${i * 0.025}s`;
        card.addEventListener("click", (e) => {
          e.preventDefault();
          navigateToArtist(artist);
        });
        card.innerHTML = `
          <div class="artist-img-wrap">${imgHtml}</div>
          <div class="artist-name">${escHtml(artist.name)}</div>
          <div class="artist-sub">${escHtml(badge)}</div>`;
        grid.appendChild(card);
      });

      overlay.classList.add("open");
      document.body.classList.add("overlay-open");
    }

    function closeSeeAllOverlay() {
      const overlay = document.getElementById("see-all-overlay");
      if (!overlay) return;
      overlay.classList.remove("open");
      document.body.classList.remove("overlay-open");
    }

    // ── Artist search (navbar) ────────────────────────────────────
    const searchInput   = document.getElementById("artist-search-input");
    const searchResults = document.getElementById("artist-search-results");
    const searchClear   = document.getElementById("artist-search-clear");

    let searchTimer = null;
    let activeIndex = -1;

    function setSearchLoading() {
      searchResults.classList.add("open");
      searchResults.innerHTML = `<div class="search-state"><span class="search-spinner"></span>Searching…</div>`;
    }

    function setSearchEmpty(query) {
      searchResults.innerHTML = `<div class="search-state search-state-empty">No artists found for "<strong>${escHtml(query)}</strong>"</div>`;
    }

    function closeSearchResults() {
      searchResults.classList.remove("open");
      searchResults.innerHTML = "";
      activeIndex = -1;
    }

    function renderSearchResults(artists) {
      if (!artists.length) return;
      activeIndex = -1;
      searchResults.classList.add("open");
      searchResults.innerHTML = artists.map((a, i) => {
        const hue  = Math.abs(hashStr(a.name)) % 360;
        const hue2 = (hue + 55) % 360;
        const sat  = 58 + (Math.abs(hashStr(a.name + "s")) % 18);
        const grad = `background:linear-gradient(135deg,hsl(${hue},${sat}%,50%),hsl(${hue2},${sat-8}%,34%))`;
        const year    = a["life-span"]?.begin?.slice(0,4) ?? "";
        const country = a.country ?? "";
        const meta    = [a.type, year, country].filter(Boolean).join(" · ") || "Artist";

        let thumb;
        if (a._coverUrl) {
          thumb = `<img src="${escHtml(a._coverUrl)}" alt="${escHtml(a.name)}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" /><span class="sr-thumb-fallback" style="${grad};display:none">${musicNoteIconSVG()}</span>`;
        } else {
          thumb = `<span class="sr-thumb-fallback" style="${grad}">${musicNoteIconSVG()}</span>`;
        }

        return `<div class="search-result-item" role="option" tabindex="-1" data-index="${i}" data-artist='${escHtml(JSON.stringify(a))}'>
          <div class="sr-thumb">${thumb}</div>
          <div class="sr-info">
            <div class="sr-name">${escHtml(a.name)}</div>
            <div class="sr-meta">${escHtml(meta)}</div>
          </div>
          <svg class="sr-arrow" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
        </div>`;
      }).join("");

      searchResults.querySelectorAll(".search-result-item").forEach(item => {
        item.addEventListener("click", () => {
          const artist = JSON.parse(item.dataset.artist);
          closeSearchResults();
          navigateToArtist(artist);
        });
        item.addEventListener("mouseenter", () => {
          activeIndex = parseInt(item.dataset.index);
          highlightItem();
        });
      });
    }

    function highlightItem() {
      searchResults.querySelectorAll(".search-result-item").forEach((el, i) => {
        el.classList.toggle("active", i === activeIndex);
      });
    }

    async function doSearch(query) {
      setSearchLoading();
      try {
        const res = await mbFetch(
          `https://musicbrainz.org/ws/2/artist?query=artist:${encodeURIComponent(query)}&limit=8&fmt=json`
        );
        if (!res.ok) throw new Error(`MusicBrainz returned status ${res.status}`);
        
        const json = await res.json();
        const artists = (json.artists ?? []).filter(a => a.id && a.name).slice(0, 8);
        
        if (!artists.length) { 
          setSearchEmpty(query); 
          return; 
        }

        // Show results immediately without images
        renderSearchResults(artists);

        // Enrich covers in background then re-render with images
        // Use the correct function name: enrichBatchWithImageValidation
        enrichBatchWithImageValidation(artists).then((enrichedArtists) => {
          // Only update if the search query hasn't changed
          if (searchInput.value.trim() === query && enrichedArtists.length > 0) {
            // Merge enriched data back into original artists array
            enrichedArtists.forEach(enriched => {
              const original = artists.find(a => a.id === enriched.id);
              if (original) {
                original._coverUrl = enriched._coverUrl;
              }
            });
            renderSearchResults(artists);
          }
        }).catch(err => {
          console.warn('[TrackWeave] Failed to enrich search results with images:', err);
          // Keep showing results without images rather than failing completely
        });
      } catch (err) {
        console.error('[TrackWeave] Search error:', err);
        searchResults.innerHTML = `<div class="search-state search-state-empty">Something went wrong. Please try again.</div>`;
      }
    }

    searchInput.addEventListener("input", () => {
      const q = searchInput.value.trim();
      searchClear.hidden = !q;
      clearTimeout(searchTimer);
      if (!q) { closeSearchResults(); return; }
      searchTimer = setTimeout(() => doSearch(q), 380);
    });

    searchInput.addEventListener("keydown", (e) => {
      const items = [...searchResults.querySelectorAll(".search-result-item")];
      if (!items.length) return;
      if (e.key === "ArrowDown") {
        e.preventDefault();
        activeIndex = Math.min(activeIndex + 1, items.length - 1);
        highlightItem();
      } else if (e.key === "ArrowUp") {
        e.preventDefault();
        activeIndex = Math.max(activeIndex - 1, 0);
        highlightItem();
      } else if (e.key === "Enter" && activeIndex >= 0) {
        e.preventDefault();
        items[activeIndex]?.click();
      } else if (e.key === "Escape") {
        closeSearchResults();
        searchInput.blur();
      }
    });

    searchInput.addEventListener("focus", () => {
      if (searchInput.value.trim() && searchResults.innerHTML) searchResults.classList.add("open");
    });

    searchClear.addEventListener("click", () => {
      searchInput.value = "";
      searchClear.hidden = true;
      closeSearchResults();
      searchInput.focus();
    });

    document.addEventListener("click", (e) => {
      if (!e.target.closest("#nav-search-wrap")) closeSearchResults();
    });

    // ── Helpers ───────────────────────────────────────────────────────
    function hashStr(s) {
      let h = 0;
      for (let i = 0; i < s.length; i++) h = (Math.imul(31, h) + s.charCodeAt(i)) | 0;
      return h;
    }
    function escHtml(s) {
      return String(s)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }
  </script>
</head>
<body>

<!-- ═══ NAV (always rendered first, highest z-index) ═══ -->
<header class="nav">
  <div class="nav-inner">

    <!-- Brand -->
    <a href="./index.html" class="nav-brand">
      <div class="nav-mark">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none">
          <circle cx="5"  cy="14" r="2.1" fill="white" opacity="0.9"/>
          <circle cx="12" cy="12" r="2.1" fill="white"/>
          <circle cx="19" cy="7"  r="2.1" fill="white" opacity="0.85"/>
          <circle cx="19" cy="17" r="2.1" fill="white" opacity="0.55"/>
          <line x1="7"  y1="13.3" x2="10.1" y2="12.4" stroke="white" stroke-width="1.3" opacity="0.7"/>
          <line x1="14" y1="11.4" x2="17.1" y2="8.3"  stroke="white" stroke-width="1.3" opacity="0.7"/>
          <line x1="14" y1="12.7" x2="17.1" y2="15.8" stroke="white" stroke-width="1.3" opacity="0.5"/>
        </svg>
      </div>
      <span>TrackWeave</span>
    </a>

    <!-- Search -->
    <div class="nav-search-dash" id="nav-search-wrap">
      <span class="s-icon">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
      </span>
      <input type="text" id="artist-search-input" placeholder="Search artists…" autocomplete="off" spellcheck="false" aria-label="Search artists" aria-autocomplete="list" aria-controls="artist-search-results" />
      <button class="nav-search-clear" id="artist-search-clear" type="button" aria-label="Clear search" hidden>
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
      <div class="nav-search-results" id="artist-search-results" role="listbox"></div>
    </div>

    <!-- Avatar + dropdown -->
    <div class="nav-avatar-wrap" id="nav-avatar-wrap">
      <button class="nav-av-btn" id="nav-avatar" aria-label="Open account menu" aria-expanded="false">?</button>

      <div class="nav-dropdown" id="nav-dropdown" role="menu">
        <div class="drop-user">
          <div class="drop-av" id="drop-av-mini">?</div>
          <div>
            <div class="drop-name" id="drop-display-name">—</div>
            <div class="drop-handle" id="drop-username"></div>
          </div>
        </div>

        <div class="drop-items">
          <button class="drop-item danger" id="btn-signout" type="button">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
              <polyline points="16 17 21 12 16 7"/>
              <line x1="21" y1="12" x2="9" y2="12"/>
            </svg>
            Sign out
          </button>
        </div>
      </div>
    </div>

  </div>
</header>

<!-- ═══ SEE ALL OVERLAY (below nav in z-index, padded by nav height) ═══ -->
<div class="see-all-overlay" id="see-all-overlay" role="dialog" aria-modal="true" aria-label="See all artists">
  <div class="see-all-topbar">
    <button class="see-all-back" id="see-all-back" type="button" aria-label="Close">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      Back
    </button>
    <span class="see-all-genre-title"></span>
    <span class="see-all-count"></span>
  </div>
  <div class="see-all-body">
    <div class="see-all-grid"></div>
  </div>
</div>

<!-- ═══ DASHBOARD ═══ -->
<div id="dash-shell" hidden>

  <!-- ── Hero banner ─────────────────────────────────────────── -->
  <div class="dash-hero">
    <div class="hero-dots"></div>
    <div class="hero-inner">
      <p class="hero-eyebrow">TrackWeave Dashboard</p>
      <h1 id="dash-name">Welcome back.</h1>
      <p class="hero-sub">Explore today's most popular artists and connect with the music that defines your generation.</p>
      <div class="hero-genres" id="hero-genres"></div>
    </div>
  </div>

  <!-- ── Main content ────────────────────────────────────────── -->
  <main>
    <div class="dash-main">
      <section class="artists-section" id="artists-section"></section>
    </div>
  </main>

</div><!-- /#dash-shell -->

<script>
  // ── Avatar dropdown ───────────────────────────────────────────
  const _wrap = document.getElementById("nav-avatar-wrap");
  const _avBtn = document.getElementById("nav-avatar");

  _avBtn.addEventListener("click", (e) => {
    e.stopPropagation();
    const open = _wrap.classList.toggle("open");
    _avBtn.setAttribute("aria-expanded", open);
  });
  document.addEventListener("click", (e) => {
    if (!_wrap.contains(e.target)) {
      _wrap.classList.remove("open");
      _avBtn.setAttribute("aria-expanded", "false");
    }
  });
  document.addEventListener("keydown", (e) => {
    if (e.key === "Escape") {
      _wrap.classList.remove("open");
      _avBtn.setAttribute("aria-expanded", "false");
    }
  });

  // ── See All overlay close ─────────────────────────────────────
  function closeSeeAllOverlay() {
    document.getElementById("see-all-overlay").classList.remove("open");
    document.body.classList.remove("overlay-open");
  }

  document.getElementById("see-all-back")?.addEventListener("click", closeSeeAllOverlay);
  document.addEventListener("keydown", (e) => {
    if (e.key === "Escape") closeSeeAllOverlay();
  });

  // ── Mirror avatar to dropdown mini-avatar ─────────────────────
  const _dropMini = document.getElementById("drop-av-mini");
  new MutationObserver(() => {
    if (_dropMini) {
      _dropMini.innerHTML = _avBtn.innerHTML;
      _dropMini.style.background = _avBtn.style.background;
    }
  }).observe(_avBtn, { childList: true, subtree: true, characterData: true });

  // ── Measure nav height for overlay offset ─────────────────────
  // Update the CSS variable whenever the nav resizes
  const navEl = document.querySelector(".nav");
  function updateNavHeight() {
    if (navEl) {
      document.documentElement.style.setProperty("--nav-height", navEl.offsetHeight + "px");
    }
  }
  updateNavHeight();
  new ResizeObserver(updateNavHeight).observe(navEl);
</script>

</body>
</html>
